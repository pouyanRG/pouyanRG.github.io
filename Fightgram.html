<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Fightgram</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ease:cubic-bezier(.4,0,.2,1);
  --bg:#09090b;--bg2:#101012;--bg3:#18181b;--bg4:#212124;
  --surface:#18181b;--surface2:#27272a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#fafafa;--text2:#a1a1aa;--text3:#61616b;
  --accent:#7c3aed;--accent2:#8b5cf6;--accent3:#a78bfa;
  --gold:#d99a3d;--red:#e05252;--green:#2fa876;--cyan:#3396ac;--pink:#d1518a;--orange:#d97c3d;
  --g1:linear-gradient(135deg,#7c3aed,#6d28d9);
  --g2:linear-gradient(135deg,#3396ac,#7c3aed);
  --g3:linear-gradient(135deg,#d99a3d,#e05252);
  --r:8px;--rsm:6px;--rlg:14px;--rxl:16px;
  --sh:0 1px 2px rgba(0,0,0,.3);
  --shm:0 8px 24px -4px rgba(0,0,0,.4),0 2px 6px -2px rgba(0,0,0,.25);
  --shl:0 24px 60px -12px rgba(0,0,0,.55),0 4px 14px -4px rgba(0,0,0,.3);
  --sha:0 0 0 1px rgba(124,58,237,.1),0 0 28px -2px rgba(124,58,237,.28);
  --fd:'Inter',sans-serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
  --nh:60px;--bh:56px;
}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input{font-family:inherit}
img{display:block;max-width:100%}
video{display:block}
::selection{background:rgba(124,58,237,.35);color:#fff}
:focus-visible{outline:2px solid var(--accent3);outline-offset:2px;border-radius:4px}
button:focus-visible{outline-offset:1px}
.fi:focus-visible{outline:none}
body::before{content:'';position:fixed;inset:0;opacity:.12;pointer-events:none;z-index:9999;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.05'/%3E%3C/svg%3E")}
.amb{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ab{position:absolute;border-radius:50%;filter:blur(140px);opacity:.06}
.ab1{width:600px;height:600px;background:var(--accent);top:-200px;left:-100px;animation:af1 28s ease-in-out infinite}
.ab2{width:500px;height:500px;background:var(--pink);bottom:-150px;right:-100px;animation:af2 32s ease-in-out infinite}
.ab3{width:350px;height:350px;background:var(--cyan);top:50%;left:50%;transform:translate(-50%,-50%);animation:af3 24s ease-in-out infinite}
@keyframes af1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,24px)}}
@keyframes af2{0%,100%{transform:translate(0,0)}50%{transform:translate(-36px,-30px)}}
@keyframes af3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.1)}}
.page{position:relative;z-index:1;animation:pfi .35s ease}
@keyframes pfi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ===== AUTH FIX - layout uses flex column ===== */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1}
.auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rxl);padding:44px 38px;width:100%;max-width:420px;box-shadow:var(--shl),var(--sha);position:relative;overflow:hidden;display:flex;flex-direction:column}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--g1)}
.auth-logo-text{font-family:var(--fd);font-weight:800;font-size:32px;letter-spacing:-.03em;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;text-align:center}
.auth-logo-sub{font-size:11px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-top:6px;font-family:var(--fm);text-align:center;margin-bottom:32px}
.auth-title{font-size:20px;font-weight:600;margin-bottom:6px;text-align:left}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:26px;line-height:1.5;text-align:left}
.fg{margin-bottom:16px;width:100%}
.fl{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:7px;letter-spacing:.5px;text-transform:uppercase}
.fi{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);padding:13px 16px;color:var(--text);font-size:15px;outline:none;transition:all .2s var(--ease);display:block}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.fi::placeholder{color:var(--text3)}
.fi.err{border-color:var(--red)}
.ferr{font-size:12px;color:var(--red);margin-top:5px}
.phone-row{display:flex;gap:8px;width:100%}
.csel{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);padding:0 12px;color:var(--text);font-size:14px;display:flex;align-items:center;gap:6px;white-space:nowrap;min-width:108px;position:relative;cursor:pointer;transition:all .2s var(--ease);height:50px;flex-shrink:0}
.csel.open{border-color:var(--accent)}
.cdrop{position:absolute;top:calc(100% + 6px);left:0;width:220px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);overflow-y:auto;max-height:220px;z-index:200;box-shadow:var(--shm)}
.copt{padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s var(--ease);font-size:13px}
.copt:hover{background:var(--surface2)}
.phone-inp{flex:1;min-width:0}
.phone-inp .fi{width:100%}
.rel{position:relative}
.pwd-eye{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--text3);cursor:pointer;transition:color .2s var(--ease);display:flex;align-items:center;background:none;border:none}
.pwd-eye:hover{color:var(--text2)}
.str-wrap{margin-top:7px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.str-bar{height:100%;border-radius:2px;transition:width .4s var(--ease),background .4s var(--ease)}
.str-label{font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--fm)}
.btn-p{width:100%;padding:14px;border-radius:var(--r);background:var(--g1);color:#fff;font-size:15px;font-weight:600;letter-spacing:.4px;transition:all .2s var(--ease);position:relative;overflow:hidden;margin-top:6px;border:none;cursor:pointer}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,58,237,.4)}
.btn-p:active{transform:translateY(0)}
.btn-p::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent)}
.btn-s{width:100%;padding:13px;border-radius:var(--r);background:var(--bg3);border:1.5px solid var(--border2);color:var(--text);font-size:15px;font-weight:500;transition:all .2s var(--ease);margin-top:8px;cursor:pointer}
.btn-s:hover{border-color:var(--accent);background:var(--surface)}

/* ===== FOLLOW PAGE ===== */
.fpage{min-height:100vh;padding:32px 20px 40px;max-width:480px;margin:0 auto;position:relative;z-index:1}
.ftitle{font-family:var(--fd);font-weight:800;font-size:26px;letter-spacing:-.02em;text-align:center;margin-bottom:6px}
.ftitle span{background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.fsub{color:var(--text2);font-size:13px;text-align:center;margin-bottom:20px;line-height:1.5}
.fnotice{display:flex;align-items:center;gap:8px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);border-radius:var(--r);padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--accent3)}
.flist{display:flex;flex-direction:column;gap:6px;margin-bottom:20px;max-height:55vh;overflow-y:auto}
.fitem{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--border);transition:all .2s var(--ease);cursor:pointer}
.fitem:hover{border-color:var(--border2);background:var(--bg3)}
.fitem.followed{border-color:rgba(124,58,237,.4);background:rgba(124,58,237,.05)}
.fname{font-weight:500;font-size:14px;flex:1}
.fvids{font-size:11px;color:var(--text3);font-family:var(--fm);margin-top:2px}
.fbtn{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;transition:all .2s var(--ease);flex-shrink:0;cursor:pointer;border:none}
.fbtn.un{background:transparent;border:1.5px solid var(--border2);color:var(--text2)}
.fbtn.fo{background:var(--g1);color:#fff}
.fbtn.fo:hover{box-shadow:0 4px 16px rgba(124,58,237,.4)}

/* ===== TOP BAR ===== */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(8,8,16,.88);backdrop-filter:blur(20px) saturate(1.5);border-bottom:1px solid var(--border)}
.tbi{display:flex;align-items:center;padding:0 18px;height:var(--nh)} /* تغییر یافت: justify-content حذف شد */
.back-btn{margin-right:8px} 
.brand{display:flex;align-items:center;gap:8px;margin-right:auto} /* تغییر یافت: اضافه شدن margin-right: auto برای فرستادن بقیه عناصر به راست */
.brand-text{font-family:var(--fd);font-weight:800;font-size:20px;letter-spacing:-.02em;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.tactions{display:flex;align-items:center;gap:6px}
.ibtn{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.ibtn :hover { color: white;}
.ibtn.act{color:var(--accent3);border-color:var(--accent);background:rgba(255, 255, 255, 0.1)}
.ibtn svg{width:20px;height:20px;fill:currentColor}


/* ===== FILTER BAR ===== */
.fbar{display:flex;align-items:center;gap:8px;padding:0 18px;height:var(--bh);overflow-x:auto;scrollbar-width:none;border-top:1px solid var(--border)}
.fbar::-webkit-scrollbar{display:none}
.fbar-label{font-size:11px;font-family:var(--fm);color:var(--text3);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.fchip{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;transition:all .2s var(--ease);cursor:pointer;flex-shrink:0;background:var(--bg3);border:1.5px solid var(--border);color:var(--text2)}
.fchip:hover{border-color:var(--accent3);color:var(--text)}
.fchip.act{background:var(--g1);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(124,58,237,.35)}

/* ===== BOTTOM NAV ===== */
.botnav {
  position: fixed;
  bottom: 20px; /* فاصله از پایین صفحه */
  left: 20px;   /* فاصله از سمت چپ */
  right: 20px;  /* فاصله از سمت راست */
  z-index: 200;
  background: rgba(22, 22, 41, 0.929);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border); /* حاشیه دور تا دور (به جای فقط بالا) */
  border-radius: 24px; /* گرد کردن تمام گوشه‌ها */
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); /* اضافه کردن سایه برای حس شناور بودن */
  display: flex;
  align-items: center;
  justify-content: space-around;
  height: var(--bh);
  padding: 0 10px;
}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:all .2s var(--ease);padding:8px 20px;border-radius:12px;min-width:72px}
.ni.act{color:#fff}
.ni-icon{display:flex;align-items:center;justify-content:center;transition:transform .2s var(--ease);width:22px;height:22px}
.ni-icon svg{width:22px;height:22px;fill:currentColor}
.ni.act .ni-icon{transform:scale(1.15)}
.ni-lbl{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.ni.act .ni-lbl{color:#fff}
.ni:not(.act) .ni-lbl{color: rgba(255, 255, 255, 0.2);}
.ni:not(.act) .ni-icon{color: rgba(255, 255, 255, 0.2);}

/* ===== STORIES ===== */
.stories-sec{padding:14px 18px 6px;margin-top:calc(var(--nh) + var(--bh));/* FIX: lock horizontal scroll on stories */}
.stories-scroll{display:flex;gap:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;touch-action:pan-x}
.stories-scroll::-webkit-scrollbar{display:none}
/* FIX: prevent normal scroll from propagating to stories */
.stories-scroll{overscroll-behavior-x:contain}
.sitem{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;width:72px}
.savtr-wrap{position:relative;width:72px;height:72px}
.savtr{border-radius:50%;object-fit:cover;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.savtr-ph{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;color:#fff;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.story-ring{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.sname{font-size:11px;color:var(--text2);width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.add-story-dot{position:absolute;bottom:2px;right:2px;width:20px;height:20px;border-radius:50%;background:var(--g1);display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid var(--bg);z-index:2;color:#fff}

/* ===== STORY VIEWER ===== */
.sv{position:fixed;inset:0;z-index:600;background:#000;display:flex;flex-direction:column;overscroll-behavior:none}
/* FIX: progress bar fills based on video time not CSS animation */
.sv-prog{display:flex;gap:4px;padding:14px 14px 8px;position:relative;z-index:2}
.sv-seg{flex:1;height:3px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden}
.sv-fill{height:100%;border-radius:2px;background:#fff;transition:width .1s linear}
.sv-fill.done{width:100%!important}
.sv-fill.pend{width:0!important}
.sv-head{display:flex;align-items:center;justify-content:space-between;padding:0 14px 12px;position:relative;z-index:2}
.sv-person{display:flex;align-items:center;gap:10px;cursor:pointer}
.sv-mavtr{width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,.7);object-fit:cover;flex-shrink:0}
.sv-pname{font-weight:600;font-size:14px;color:#fff}
.sv-time{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px;font-family:var(--fm)}
.sv-close{font-size:26px;color:rgba(255,255,255,.85);cursor:pointer;padding:4px;line-height:1;background:none;border:none;display:flex;align-items:center}
.sv-close svg{width:22px;height:22px;fill:currentColor}
.sv-media{flex:1;position:relative;overflow:hidden}
.sv-media video,.sv-media img{width:100%;height:100%;object-fit:contain}
.sv-tap-l,.sv-tap-r{position:absolute;top:0;bottom:0;width:40%;z-index:10;cursor:pointer}
.sv-tap-l{left:0}
.sv-tap-r{right:0}
.sv-gtop{position:absolute;top:0;left:0;right:0;height:180px;background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);pointer-events:none;z-index:1}
.sv-gbot{position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(to top,rgba(0,0,0,.6),transparent);pointer-events:none;z-index:1}

/* ===== FEED ===== */
.feed-sec{padding:10px 18px 100px}
.feed-grid{display:grid;gap:14px}
@media(min-width:580px){.feed-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.feed-grid{grid-template-columns:repeat(3,1fr)}}
.vc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden;transition:all .25s var(--ease);cursor:pointer;position:relative}
.vc:hover{border-color:var(--border2);box-shadow:var(--shm)}
.vc-thumb{position:relative;aspect-ratio:16/9;background:var(--bg3);overflow:hidden}
.vc-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s var(--ease)}
.vc:hover .vc-thumb img{transform:scale(1.04)}
.vc-thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3)}
.vc-thumb-ph svg{width:44px;height:44px;fill:currentColor;opacity:.4}
.vc-dur{position:absolute;bottom:10px;right:10px;background:rgba(0, 0, 0, 0.522);backdrop-filter:blur(4px);padding:3px 8px;border-radius:6px;font-size:12px;font-family:var(--fm)}
.vc-fmt{position:absolute;top:10px;left:10px;background:var(--g1);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.4px}
.vc-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s var(--ease)}
.vc:hover .vc-play{opacity:1}
.vc-play-btn{width:52px;height:52px;border-radius:50%;background:rgba(0, 0, 0, 0.45);display:flex;align-items:center;justify-content:center}
.vc-play-btn svg{width:22px;height:22px;fill:#fff;margin-left:3px}
.vc-info{padding:12px 15px 14px}
.vc-prow{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.vc-pavtr{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0}
.vc-pname{font-size:13px;color:var(--accent3);font-weight:500;cursor:pointer}
.vc-pname:hover{text-decoration:underline}
.vc-date{font-size:11px;color:var(--text3);font-family:var(--fm);margin-left:auto}
.vc-title{font-size:15px;font-weight:600;line-height:1.3;margin-bottom:9px}
.vc-tags{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.vc-tag{padding:3px 9px;border-radius:6px;font-size:11px;font-family:var(--fm);background:rgba(124,58,237,.12);color:var(--accent3);border:1px solid rgba(124,58,237,.2);display:flex;align-items:center;gap:4px}
.vc-tag svg{width:12px;height:12px;fill:currentColor}

/* ===== REELS — immersive vertical feed (self-contained module) =====
   Layout/interaction JS lives in the ReelsFeed module. It deliberately
   never touches the global Store, so liking/following/muting/scrolling
   never triggers the app-wide innerHTML rebuild — the feed stays smooth
   and playback is never interrupted. */
.rlx-wrap{position:relative;width:100%;height:100vh;height:100dvh;overflow:hidden;background:#000}
.rlx-feed{position:relative;width:100%;height:100%;overflow-y:auto;scroll-snap-type:y mandatory;overscroll-behavior-y:contain;scrollbar-width:none}
.rlx-feed::-webkit-scrollbar{display:none}
.rlx-slide{position:relative;width:100%;height:100%;scroll-snap-align:start;scroll-snap-stop:always;background:#0a0a12;overflow:hidden}
.rlx-poster{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;transition:opacity .25s var(--ease)}
.rlx-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;background:#000;opacity:0;transition:opacity .25s var(--ease)}
.rlx-slide.playing .rlx-video{opacity:1}
.rlx-slide.playing .rlx-poster{opacity:0}
.rlx-tapzone{position:absolute;inset:0;z-index:5;cursor:pointer;-webkit-tap-highlight-color:transparent}
.rlx-center-icon{position:absolute;top:50%;left:50%;width:64px;height:64px;transform:translate(-50%,-50%) scale(.7);border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:6;opacity:0;pointer-events:none;transition:opacity .25s var(--ease),transform .25s var(--ease)}
.rlx-center-icon svg{width:28px;height:28px;fill:#fff}
.rlx-center-icon.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.rlx-grad-top{position:absolute;top:0;left:0;right:0;height:110px;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);pointer-events:none;z-index:3}
.rlx-grad-bot{position:absolute;bottom:0;left:0;right:0;height:230px;background:linear-gradient(to top,rgba(0,0,0,.78),transparent);pointer-events:none;z-index:3}
.rlx-side-actions{position:absolute;right:10px;bottom:calc(var(--bh) + 26px);z-index:8;display:flex;flex-direction:column;align-items:center;gap:17px}
.rlx-side-avtr{position:relative;width:46px;height:46px;margin-bottom:2px;cursor:pointer;flex-shrink:0}
.rlx-avtr-img{border:2px solid rgba(255,255,255,.85)}

.pp-info{flex:1;min-width:0}
.pp-name{font-size:20px;font-weight:700;margin-bottom:3px}
.pp-cnt{font-size:12px;color:var(--text3);font-family:var(--fm);margin-bottom:8px}
.pp-bio{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:12px}
.pp-fbtn{padding:9px 24px;border-radius:20px;font-size:13px;font-weight:600;transition:all .2s var(--ease);cursor:pointer;border:none}
.pp-fbtn.fo{background:var(--g1);color:#fff}
.pp-fbtn.fo:hover{box-shadow:0 6px 20px rgba(124,58,237,.4)}
.pp-fbtn.un{background:var(--bg3);border:1.5px solid var(--border2);color:var(--text2)}
.pp-sort-bar{display:flex;gap:8px;padding:12px 18px 0;overflow-x:auto;scrollbar-width:none}
.pp-sort-bar::-webkit-scrollbar{display:none}
.sch{padding:6px 13px;border-radius:16px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s var(--ease);background:var(--bg3);border:1px solid var(--border);color:var(--text2);white-space:nowrap}
.sch.act{background:rgba(124,58,237,.15);border-color:var(--accent);color:var(--accent3)}
.pp-grid{padding:12px 18px;display:flex;flex-direction:column;gap:12px}

/* ===== PROFILE - full edit ===== */
.prof-page{padding:calc(var(--nh) + 16px) 18px 100px}
.prof-hero{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rxl);padding:28px 20px;margin-bottom:18px;position:relative;overflow:hidden;text-align:center}
.prof-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--g1)}
.prof-avtr-btn{position:relative;display:inline-block;cursor:pointer;margin-bottom:12px}
.avtr-edit{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s var(--ease)}
.avtr-edit svg{width:24px;height:24px;fill:#fff}
.prof-avtr-btn:hover .avtr-edit{opacity:1}
.prof-name{font-size:21px;font-weight:700;margin-bottom:2px}
.prof-username{font-size:13px;color:var(--accent3);font-family:var(--fm);margin-bottom:4px}
.prof-bio-disp{font-size:13px;color:var(--text2);margin-bottom:4px;line-height:1.5}
.prof-phone{font-size:12px;color:var(--text3);font-family:var(--fm);margin-bottom:16px}
.prof-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.prof-act-btn{padding:9px 20px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s var(--ease);border:none;display:flex;align-items:center;gap:6px}
.prof-act-btn svg{width:15px;height:15px;fill:currentColor}
.prof-act-btn.primary{background:var(--g1);color:#fff}
.prof-act-btn.primary:hover{box-shadow:0 6px 20px rgba(124,58,237,.4)}
.prof-act-btn.sec{background:var(--bg3);border:1.5px solid var(--border2);color:var(--text2)}
.prof-act-btn.sec:hover{border-color:var(--accent);color:var(--text)}
.prof-act-btn.danger{background:rgba(239,68,68,.12);border:1.5px solid rgba(239,68,68,.3);color:var(--red)}
.prof-act-btn.danger:hover{background:rgba(239,68,68,.2)}
.prof-stats{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden;margin-bottom:18px}
.stat-i{flex:1;padding:14px 8px;text-align:center;border-right:1px solid var(--border);cursor:pointer;transition:background .2s var(--ease)}
.stat-i:last-child{border-right:none}
.stat-i:hover{background:var(--bg3)}
.stat-n{font-family:var(--fd);font-weight:800;font-size:22px;letter-spacing:-.02em;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.stat-l{font-size:10px;color:var(--text3);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.prof-sec{margin-bottom:18px}
.prof-sec-title{font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;font-family:var(--fm);margin-bottom:10px;padding-left:2px}
.fw-list{display:flex;flex-direction:column;gap:6px}
.fw-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .2s var(--ease)}
.fw-item:hover{border-color:var(--accent);background:var(--bg3)}
.fw-avn{font-weight:500;font-size:14px}
.fw-avm{font-size:11px;color:var(--text3);font-family:var(--fm);margin-top:2px}
/* Stories strip - image AND video support */
.my-stories-strip{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:6px}
.my-stories-strip::-webkit-scrollbar{display:none}
.my-st-item{flex-shrink:0;width:72px;height:100px;border-radius:var(--rsm);overflow:hidden;position:relative;background:var(--bg3);cursor:pointer}
.my-st-item video,.my-st-item img{width:100%;height:100%;object-fit:cover}
.my-st-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center}
.my-st-overlay svg{width:22px;height:22px;fill:#fff}
.my-st-del{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(239,68,68,.85);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;z-index:5}
.my-st-del svg{width:12px;height:12px;fill:#fff}
.my-st-add{flex-shrink:0;width:72px;height:100px;border-radius:var(--rsm);border:2px dashed var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);transition:all .2s var(--ease);gap:4px}
.my-st-add svg{width:26px;height:26px;fill:currentColor}
.my-st-add:hover{border-color:var(--accent);color:var(--accent3)}
.my-st-add-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;font-family:var(--fm)}
.settings-list{display:flex;flex-direction:column;gap:6px}
.set-item{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .2s var(--ease)}
.set-item:hover{border-color:var(--border2);background:var(--bg3)}
.set-icon{width:32px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.set-icon svg{width:18px;height:18px;fill:currentColor;color:var(--text2)}
.set-label{flex:1;font-size:14px;font-weight:500}
.set-val{font-size:12px;color:var(--text3)}
.set-chev{color:var(--text3);font-size:12px}

/* ===== EDIT PROFILE MODAL ===== */
.edit-modal{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.85);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;padding:24px;animation:pfi .2s ease}
.edit-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rxl);padding:32px 28px;width:100%;max-width:440px;position:relative;max-height:90vh;overflow-y:auto}
.edit-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--g1);border-radius:var(--rxl) var(--rxl) 0 0}
.edit-title{font-size:18px;font-weight:700;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between}
.edit-close{color:var(--text2);display:flex;align-items:center;padding:4px;background:none;border:none;cursor:pointer}
.edit-close svg{width:22px;height:22px;fill:currentColor}

/* ===== BACK BTN ===== */
.back-btn{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text2);cursor:pointer;padding:6px 10px;border-radius:8px;transition:all .2s var(--ease);background:none;border:none}
.back-btn:hover{color:var(--text);background:var(--bg3)}
.back-btn svg{width:18px;height:18px;fill:currentColor}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);padding:11px 20px;border-radius:var(--r);z-index:1000;font-size:14px;box-shadow:var(--shm);animation:tin .3s ease,tout .3s ease 2.5s forwards;white-space:nowrap}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateX(-50%) translateY(10px)}}

/* ===== EMPTY ===== */
.empty{text-align:center;padding:50px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;grid-column:1/-1}
.empty-icon{opacity:.35;display:flex;align-items:center;justify-content:center}
.empty-icon svg{width:44px;height:44px;fill:currentColor}
.empty-title{font-size:17px;font-weight:600;color:var(--text2)}
.empty-sub{font-size:13px;color:var(--text3);line-height:1.5;max-width:250px}

@media(min-width:900px){
  .tbi,.fbar,.stories-sec,.feed-sec,.prof-page{max-width:960px;margin-left:auto;margin-right:auto}
}

/* ===== CORE ARCHITECTURE: EVENT BUS ===== */
const EventBus = (function() {
  const events = {};
  return {
    on: (event, listener) => { if (!events[event]) events[event] = []; events[event].push(listener); },
    emit: (event, data) => { if (events[event]) events[event].forEach(l => l(data)); },
    off: (event, listener) => { if (events[event]) events[event] = events[event].filter(l => l !== listener); }
  };
})();

/* ===== CORE ARCHITECTURE: PERSISTENCE LAYER (Safe, Debounced) ===== */
const StorageEngine = (function() {
  const writeQueue = new Map();
  const DEBOUNCE_MS = 250;
  return {
    get: (key, fallback) => {
      try {
        const item = localStorage.getItem(key);
        return item ? JSON.parse(item) : fallback;
      } catch (e) {
        console.warn(`[Storage] Read error / Corruption on ${key}. Resetting to fallback.`, e);
        return fallback;
      }
    },
    set: (key, value) => {
      if (writeQueue.has(key)) clearTimeout(writeQueue.get(key));
      writeQueue.set(key, setTimeout(() => {
        try {
          localStorage.setItem(key, JSON.stringify(value));
        } catch (e) {
          console.error(`[Storage] Write error on ${key} (Quota exceeded?)`, e);
        }
        writeQueue.delete(key);
      }, DEBOUNCE_MS));
    },
    remove: (key) => localStorage.removeItem(key)
  };
})();

        state = { ...state, ...action.payload };
      } else if (action.type === 'MUTATE') {

      }
      EventBus.emit('STATE_CHANGED', state);
    }
  };
})();

/* ===== CORE ARCHITECTURE: PROXY FACADE (Backward Compatibility) ===== */
/* This safely intercepts legacy direct mutations (e.g. S.foo = bar) and funnels them through the Store dispatcher */
const S = new Proxy(CoreStore.getState(), {
  get: (target, prop) => CoreStore.getState()[prop],
  set: (target, prop, value) => {
    CoreStore.dispatch({ type: 'MUTATE', payload: { key: prop, value } });
    return true;
  }
});

/* ===== CORE ARCHITECTURE: RENDER ENGINE (Incremental Batching) ===== */
const RenderEngine = (function() {
  let renderPending = false;
  return {
    schedule: () => {
      if (renderPending) return;
      renderPending = true;
      requestAnimationFrame(() => {
        performSafeRender();
        renderPending = false;
      });
    }
  };
})();

EventBus.on('STATE_CHANGED', () => RenderEngine.schedule());

/* Override original render to use scheduler, but keep it available globally */
window.render = () => RenderEngine.schedule();

/* ===== CORE ARCHITECTURE: MEDIA ENGINE (Performance & IntersectionObserver) ===== */
const MediaController = (function() {
  let observer = null;
  return {
    init: () => {
      if ('IntersectionObserver' in window) {
        observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            const vid = entry.target;
            if (vid.tagName === 'VIDEO' && !entry.isIntersecting && !vid.paused) {
              // Only pause videos not currently in full-screen modal
              if (!vid.closest('#vmov')) {
                  vid.pause();
              }
            }
          });
        }, { threshold: 0.2 });
      }
    },
    observe: () => {
      if (!observer) return;
      document.querySelectorAll('video').forEach(v => observer.observe(v));
    }
  };
})();
MediaController.init();

function pwdStr(p){
  if(!p)return{pct:0,label:'',color:''};
  let s=0;
  if(p.length>=6)s++;if(p.length>=10)s++;
  if(/[A-Z]/.test(p))s++;if(/[a-z]/.test(p))s++;
  if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;
  if(s<=2)return{pct:20,label:'Weak',color:'#ef4444'};
  if(s<=3)return{pct:50,label:'Medium',color:'#eab308'};

}

/* ===== STORY RING GEOMETRY =====
   Audit fix: stroke width, ring radius and avatar diameter used to be three
   independent magic numbers (r=(size-5)/2, stroke-width=2.8, avatar=64px
   inside a 72px ring). That left ~0.1px between the avatar edge and the
   ring's inner edge instead of the ~3-4px of negative space a story ring
   needs, so the two visually collided. This derives all three from one
   container size so the gap is always consistent, wherever a ring is
   rendered (72px on Home, 84px on the Person page). */
function ringGeometry(containerSize){
  const strokeWidth=Math.max(2,+(containerSize*0.036).toFixed(2));
  const outerMargin=Math.max(1.5,+(containerSize*0.02).toFixed(2));
  const R=+(containerSize/2-outerMargin-strokeWidth/2).toFixed(2);
  const negSpace=Math.max(3.5,+(containerSize*0.055).toFixed(2));
  const avatarSize=+(2*(R-strokeWidth/2-negSpace)).toFixed(1);
  return{strokeWidth,R,avatarSize};
}

/* ===== STORY RING SVG - Instagram style multicolor ===== */
function ringsSVG(pid,size=72){
  const ownStories=(pid==='__me__'?(S.user?.myStories||[]).filter(s=>(Date.now()-s.date)<86400000):(PEOPLE.find(x=>x.id===pid)?.stories||[]).filter(s=>(Date.now()-s.date)<86400000));
  if(!ownStories.length)return'';
  const watched=loadWatched();
  const wc=(watched[pid]||[]).length;
  const total=ownStories.length;
  const {strokeWidth,R}=ringGeometry(size);
  const cx=size/2,cy=size/2,r=R;
  const gId=`rg_${pid.replace(/[^a-z0-9]/gi,'_')}`;
  /* Audit fix: SVG has no native conic-gradient primitive, so a true
     sweep gradient isn't directly reproducible here. As the closest
     practical approximation, the actual Instagram ring color recipe
     (warm yellow → red-orange → magenta → blue) is swept diagonally
     across the ring's bounding box, replacing the previous generic
     4-stop purple/pink gradient for noticeably better color fidelity. */
  const grad=`<defs>
    <linearGradient id="${gId}" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fdf497"/>
      <stop offset="15%" stop-color="#fdf497"/>
      <stop offset="45%" stop-color="#fd5949"/>
      <stop offset="60%" stop-color="#d6249f"/>
      <stop offset="90%" stop-color="#285aeb"/>
      <stop offset="100%" stop-color="#285aeb"/>
    </linearGradient>
  </defs>`;
  const seenStroke='rgba(150,150,160,0.3)';
  const activeStroke=`url(#${gId})`;
  if(total===1){
    const done=wc>=1;
    return`<svg class="story-ring" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${grad}<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${done?seenStroke:activeStroke}" stroke-width="${strokeWidth}"/></svg>`;
  }
  /* Audit fix: the segment gap used to be a fixed 0.09 radian value
     regardless of story count, so it looked cramped with many stories and
     oversized with few. It's now derived from a constant physical arc
     length (~4px) divided by the ring radius, clamped so segments never
     collapse when a person has a lot of active stories. */
  const GAP_ARC_PX=4;
  const gap=Math.min(GAP_ARC_PX/r,(2*Math.PI/total)*0.4);
  const segA=(2*Math.PI/total)-gap;let segs='';
  for(let i=0;i<total;i++){
    const sa=-Math.PI/2+i*(2*Math.PI/total);const ea=sa+segA;
    const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa);
    const x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
    const la=segA>Math.PI?1:0;const done=i<wc;
    segs+=`<path d="M${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${la},1 ${x2.toFixed(2)},${y2.toFixed(2)}" fill="none" stroke="${done?seenStroke:activeStroke}" stroke-width="${strokeWidth}" stroke-linecap="round"/>`;
  }
  return`<svg class="story-ring" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${grad}${segs}</svg>`;
}

function validStories(pid){
  if(pid==='__me__')return(S.user?.myStories||[]).filter(s=>(Date.now()-s.date)<86400000).sort((a,b)=>a.date-b.date);
  return(PEOPLE.find(x=>x.id===pid)?.stories||[]).filter(s=>(Date.now()-s.date)<86400000).sort((a,b)=>a.date-b.date);
}
function sortMedia(list,f){
  const c=[...list];
  if(f==='oldest')return c.sort((a,b)=>a.date-b.date);
  if(f==='longest')return c.sort((a,b)=>b.dur.localeCompare(a.dur));
  if(f==='shortest')return c.sort((a,b)=>a.dur.localeCompare(b.dur));
  if(f==='popular')return c.sort((a,b)=>b.views-a.views);
  return c.sort((a,b)=>b.date-a.date);
}

/* =======================================================================
   REELS FEED MODULE — isolated from the global render cycle on purpose.
   The rest of the app does a full innerHTML rebuild on every state change
   (see RenderEngine/deepCoreRender). That's fine for normal pages, but it
   would destroy and recreate every <video> in this feed on each like/
   follow/mute tap, killing playback, scroll position and buffered data.
   So: after the initial mount, this module manages its own DOM directly
   and only reaches into shared app data (S.user.following, StorageEngine)
   for things that must persist — never through the reactive S proxy — so
   browsing Reels never trips a global re-render. Leaving the Reels page
   (bottom nav) still uses the normal router/state flow like everywhere
   else in the app.
   ======================================================================= */
const ReelsFeed=(function(){
  let mounted=false;
  let slideObserver=null;     // decides which slide is "active" (autoplay)
  let sentinelObserver=null;  // triggers infinite-scroll loading
  let cycle=0;                // running index into MEDIA for the virtual/looping feed
  let activeUid=null;
  let globalMuted=true;       // videos must start muted for autoplay to be allowed by browsers
  const LOAD_WINDOW=1;        // keep only [active-1, active, active+1] videos loaded in memory
  const BATCH_SIZE=4;
  const likes=StorageEngine.get('Fightgram_reel_likes',{});

  /* Deterministic fake engagement numbers (no backend), same pattern as ac()/ini() above */
  function pseudoCount(seed,min,max){
    let h=0;for(let i=0;i<seed.length;i++)h=(h*31+seed.charCodeAt(i))>>>0;
    return min+(h%(max-min));
  }

  /* Small local toast, independent from the shared toast() helper.
     (toast() dispatches through CoreStore to track its timer, which would
     schedule a full app re-render — exactly what this module avoids.) */
  function localToast(msg){
    document.querySelectorAll('.toast').forEach(t=>t.remove());
    const el=document.createElement('div');el.className='toast';el.textContent=msg;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2200);
  }

  function nextBatch(n){
    const batch=[];
    for(let i=0;i<n;i++){
      const m=MEDIA[cycle%MEDIA.length];
      batch.push({uid:`${m.id}__${cycle}`,media:m});
      cycle++;
    }
    return batch;
  }

  function slideHTML(item){
    const m=item.media,p=PEOPLE.find(x=>x.id===m.person);
    const isLiked=!!likes[m.id];
    const likeCount=pseudoCount(m.id+'l',120,9400)+(isLiked?1:0);
    const commentCount=pseudoCount(m.id+'c',3,340);
    const shareCount=pseudoCount(m.id+'s',1,120);
    const fw=S.user?.following||[];
    const isFollowing=p?fw.includes(p.id):true;
    const uname='@'+(p?.name||'creator').replace(/\s+/g,'').toLowerCase();
    return`<div class="rlx-slide" data-uid="${item.uid}" data-mid="${m.id}">
      <img class="rlx-poster" src="${m.thumb}" alt="" loading="lazy">
      <video class="rlx-video" muted playsinline loop preload="none" poster="${m.thumb}"></video>
      <div class="rlx-grad-top"></div>
      <div class="rlx-tapzone" data-tap="1"></div>
      <div class="rlx-center-icon" data-center="1"></div>
      <div class="rlx-grad-bot"></div>
      <div class="rlx-side-actions">
        <div class="rlx-side-avtr" data-person="${p?.id||''}">
          ${avHTML(p?.avatar||'',p?.name||'?',p?.id||m.id,46,'rlx-avtr-img')}
          ${p&&!isFollowing?`<button class="rlx-follow-dot" data-follow="${p.id}">+</button>`:''}
        </div>
        <button class="rlx-act ${isLiked?'liked':''}" data-like="${m.id}">
          <span class="rlx-act-icon">${isLiked?IC.heartFill:IC.heart}</span>
          <span class="rlx-act-count">${fmtViews(likeCount)}</span>
        </button>
        <button class="rlx-act" data-comment="${m.id}">
          <span class="rlx-act-icon">${IC.comment}</span>
          <span class="rlx-act-count">${fmtViews(commentCount)}</span>
        </button>
        <button class="rlx-act" data-share="${m.id}">
          <span class="rlx-act-icon">${IC.share}</span>
          <span class="rlx-act-count">${fmtViews(shareCount)}</span>
        </button>
        <button class="rlx-act rlx-mute" data-mute="1" aria-label="Toggle sound">
          <span class="rlx-act-icon">${globalMuted?IC.mute:IC.vol}</span>
        </button>
      </div>
      <div class="rlx-info">
        <div class="rlx-info-top">
          <span class="rlx-uname" data-person="${p?.id||''}">${uname}</span>
          ${p?`<button class="rlx-follow-btn ${isFollowing?'following':''}" data-follow="${p.id}">${isFollowing?'Following':'Follow'}</button>`:''}
        </div>
        <div class="rlx-caption">${m.title} <span class="rlx-tag">#${m.tag}</span></div>
      </div>
    </div>`;
  }

  function flashCenterIcon(slide,playing){
    const el=slide.querySelector('[data-center]');if(!el)return;
    el.innerHTML=playing?IC.play:IC.pause;
    el.classList.remove('show');void el.offsetWidth;el.classList.add('show');
    clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),550);
  }

  function loadWindow(activeSlide){
    const slides=[...document.querySelectorAll('.rlx-slide')];
    const idx=slides.indexOf(activeSlide);
    slides.forEach((s,i)=>{
      const video=s.querySelector('.rlx-video');
      const m=MEDIA.find(x=>x.id===s.dataset.mid);
      if(!video||!m)return;
      const within=Math.abs(i-idx)<=LOAD_WINDOW;
      if(within){
        if(video.dataset.loaded!=='1'){
          video.src=m.link;video.dataset.loaded='1';video.muted=globalMuted;video.load();
        }
      }else if(video.dataset.loaded==='1'){
        video.pause();s.classList.remove('playing');
        video.removeAttribute('src');video.load();video.dataset.loaded='';
      }
    });
  }

  function activateSlide(slide){
    const uid=slide.dataset.uid;
    loadWindow(slide);
    document.querySelectorAll('.rlx-slide').forEach(s=>{
      if(s!==slide){const v=s.querySelector('.rlx-video');if(v&&!v.paused)v.pause();s.classList.remove('playing');}
    });
    if(activeUid===uid)return;
    activeUid=uid;
    const video=slide.querySelector('.rlx-video');
    if(video){
      video.muted=globalMuted;
      video.play().then(()=>slide.classList.add('playing')).catch(()=>{});
    }
  }

  function deactivateSlide(slide){
    const video=slide.querySelector('.rlx-video');
    if(video&&!video.paused)video.pause();
    slide.classList.remove('playing');
  }

  function setupSlideObserver(){
    slideObserver?.disconnect();
    slideObserver=new IntersectionObserver(entries=>{
      entries.forEach(entry=>{
        if(entry.isIntersecting&&entry.intersectionRatio>=0.6)activateSlide(entry.target);
        else deactivateSlide(entry.target);
      });
    },{threshold:[0,0.6,1]});
    document.querySelectorAll('.rlx-slide').forEach(s=>slideObserver.observe(s));
  }

  function setupSentinel(container){
    sentinelObserver?.disconnect();
    const sentinel=container.querySelector('#rlxSentinel');if(!sentinel)return;
    sentinelObserver=new IntersectionObserver(entries=>{
      entries.forEach(entry=>{if(entry.isIntersecting)appendBatch(container);});
    },{root:container,threshold:0.01});
    sentinelObserver.observe(sentinel);
  }

  function appendBatch(container){
    const sentinel=container.querySelector('#rlxSentinel');if(!sentinel)return;
    const batch=nextBatch(BATCH_SIZE);
    const tmp=document.createElement('div');tmp.innerHTML=batch.map(slideHTML).join('');
    [...tmp.children].forEach(node=>{
      container.insertBefore(node,sentinel);
      slideObserver?.observe(node);
      bindSlideEvents(node);
    });
  }

  function bindSlideEvents(slide){
    slide.querySelector('[data-tap]')?.addEventListener('click',()=>{
      const video=slide.querySelector('.rlx-video');if(!video)return;
      if(video.paused){video.play().then(()=>slide.classList.add('playing')).catch(()=>{});flashCenterIcon(slide,true);}
      else{video.pause();flashCenterIcon(slide,false);}
    });

    slide.querySelectorAll('[data-follow]').forEach(btn=>{
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        const pid=btn.dataset.follow;
        if(!S.user)return;
        if(!Array.isArray(S.user.following))S.user.following=[];
        const fw=S.user.following;const idx=fw.indexOf(pid);
        const nowFollowing=idx<0;
        if(idx>=0)fw.splice(idx,1);else fw.push(pid);
        regUser(S.user);saveUser(); // persisted directly — bypasses the S proxy so no global re-render fires
        document.querySelectorAll(`[data-follow="${pid}"]`).forEach(el=>{
          if(el.classList.contains('rlx-follow-btn')){
            el.textContent=nowFollowing?'Following':'Follow';
            el.classList.toggle('following',nowFollowing);
          }else if(el.classList.contains('rlx-follow-dot')){
            el.style.display=nowFollowing?'none':'flex';
          }
        });
      });
    });

    slide.querySelector('[data-like]')?.addEventListener('click',e=>{
      e.stopPropagation();
      const mid=e.currentTarget.dataset.like;
      likes[mid]=!likes[mid];
      StorageEngine.set('Fightgram_reel_likes',likes);
      const isLiked=!!likes[mid];
      const base=pseudoCount(mid+'l',120,9400);
      document.querySelectorAll(`[data-like="${mid}"]`).forEach(el=>{
        el.classList.toggle('liked',isLiked);
        const icon=el.querySelector('.rlx-act-icon'),count=el.querySelector('.rlx-act-count');
        if(icon)icon.innerHTML=isLiked?IC.heartFill:IC.heart;
        if(count)count.textContent=fmtViews(base+(isLiked?1:0));
      });
    });

    slide.querySelector('[data-comment]')?.addEventListener('click',e=>{e.stopPropagation();localToast('Comments coming soon');});

    slide.querySelector('[data-share]')?.addEventListener('click',e=>{
      e.stopPropagation();
      const mid=e.currentTarget.dataset.share;
      const m=MEDIA.find(x=>x.id===mid);
      const shareData={title:'Fightgram',text:m?.title||'Check this out on Fightgram',url:location.href};
      if(navigator.share)navigator.share(shareData).catch(()=>{});
      else if(navigator.clipboard)navigator.clipboard.writeText(shareData.url).then(()=>localToast('Link copied!')).catch(()=>localToast('Unable to copy link'));
      else localToast('Sharing not supported');
    });

    slide.querySelector('[data-mute]')?.addEventListener('click',e=>{
      e.stopPropagation();
      globalMuted=!globalMuted;
      document.querySelectorAll('.rlx-video').forEach(v=>v.muted=globalMuted);
      document.querySelectorAll('[data-mute] .rlx-act-icon').forEach(icon=>icon.innerHTML=globalMuted?IC.mute:IC.vol);
    });

    slide.querySelectorAll('[data-person]').forEach(el=>{
      el.addEventListener('click',e=>{
        e.stopPropagation();
        const pid=el.dataset.person;if(!pid)return;
        unmount();
        S.personId=pid;S.personSort='newest';S.prevPages.push(S.page);S.page='person';window.scrollTo(0,0);
      });
    });
  }

  function mount(){
    const container=document.getElementById('rlxFeed');
    if(!container)return;
    unmount(); // guard against double-mount, then start clean
    mounted=true;cycle=0;activeUid=null;
    container.scrollTop=0;
    appendBatch(container);
    setupSlideObserver();
    setupSentinel(container);
    requestAnimationFrame(()=>{
      const first=container.querySelector('.rlx-slide');
      if(first)activateSlide(first);
    });
  }

  function unmount(){
    if(!mounted&&!slideObserver&&!sentinelObserver)return;
    mounted=false;
    slideObserver?.disconnect();slideObserver=null;
    sentinelObserver?.disconnect();sentinelObserver=null;
    document.querySelectorAll('.rlx-video').forEach(v=>{try{v.pause();v.removeAttribute('src');v.load();}catch(e){}});
  }

  return{mount,unmount};
})();

function renderStoryViewer(){
  const sv=S.sv;if(!sv)return'';
  const pid=sv.ids[sv.pi];
  const stories=validStories(pid);
  if(!stories.length){advStoryPerson(1);return'';}
  const story=stories[sv.si];
  const total=stories.length;
  const isMe=pid==='__me__';
  const p=isMe?null:PEOPLE.find(x=>x.id===pid);
  const pname=isMe?'You':(p?.name||'');
  const pavtr=isMe?(S.user?.avatar||''):(p?.avatar||'');
  const w=loadWatched();
  if(!w[pid])w[pid]=[];
  if(!w[pid].includes(sv.si)){w[pid].push(sv.si);saveWatched(w);}
  const segs=stories.map((_,i)=>`<div class="sv-seg"><div class="sv-fill ${i<sv.si?'done':i===sv.si?'active':'pend'}" id="svFill${i}" style="${i===sv.si?'width:0':i<sv.si?'width:100%':'width:0'}"></div></div>`).join('');
  const isVid=!story.type||story.type==='video';
  return`<div class="sv" id="svRoot">
    <div class="sv-gtop"></div>
    <div class="sv-prog" id="svProg">${segs}</div>
    <div class="sv-head">
      <div class="sv-person" id="svPersonLink" data-person="${pid}">
        ${avHTML(pavtr,pname,pid==='__me__'?'me':pid,38,'sv-mavtr')}
        <div><div class="sv-pname">${pname}</div><div class="sv-time">${fmtTime(story.date)}</div></div>
      </div>
      <button class="sv-close" id="svClose">${IC.close}</button>
    </div>
    <div class="sv-media" id="svMedia">
      ${isVid
        ?`<video id="svVideo" src="${story.link}" autoplay playsinline preload="auto" style="width:100%;height:100%;object-fit:contain"></video>`
        :`<img id="svImg" src="${story.link}" style="width:100%;height:100%;object-fit:contain">`}
      <div class="sv-tap-l" id="svL"></div>
      <div class="sv-tap-r" id="svR"></div>
    </div>
    <div class="sv-gbot"></div>
  </div>`;
}

function advStoryPerson(d){S.sv.pi+=d;S.sv.si=0;if(S.sv.pi<0||S.sv.pi>=S.sv.ids.length)S.sv=null;render();}
function advStory(d){
  const stories=validStories(S.sv.ids[S.sv.pi]);S.sv.si+=d;
  if(S.sv.si<0){advStoryPerson(-1);return;}
  if(S.sv.si>=stories.length){advStoryPerson(1);return;}
  render();
}

/* ===== MAIN RENDER ===== */
function deepCoreRender(){
  const root=document.getElementById('root');
  ['svLayer','srchLayer','catLayer','vmovLayer','editLayer'].forEach(id=>document.getElementById(id)?.remove());
  let html='';
  switch(S.page){
    case'login':html=renderLogin();break;
    case'register':html=renderRegister();break;
    case'password':html=renderPwdPage();break;
    case'followSuggest':html=renderFollowSuggest();break;
    case'home':html=renderHome();break;
    case'reels':html=renderReels();break;
    case'profile':html=renderProfile();break;
    case'person':html=renderPersonPage();break;
    default:html=renderHome();
  }
  root.innerHTML=html;
  const mkLayer=(id,html)=>{const d=document.createElement('div');d.id=id;d.innerHTML=html;document.body.appendChild(d);return d;};
  if(S.sv)mkLayer('svLayer',renderStoryViewer());
  if(S.searchOpen)mkLayer('srchLayer',renderSearch());
  if(S.catOpen)mkLayer('catLayer',renderCat());
  if(S.videoId)mkLayer('vmovLayer',renderVideoModal());
  if(S.editOpen)mkLayer('editLayer',renderEditModal());
  attachEvents();
}

  $('logoutBtn')?.addEventListener('click',()=>{

/* =======================================================================
   Focus Management & Safe Rendering Cycle (Incremental Architecture Wrap)
   ======================================================================= */
function performSafeRender() {
    const activeElement = document.activeElement;
    const activeElementId = activeElement ? activeElement.id : null;
    let selectionStart = null, selectionEnd = null, selectionDirection = null;
    let isPasswordFocused = false, isUsernameFocused = false;

    if (activeElement) {
        const tagName = activeElement.tagName.toUpperCase();
        if (tagName === 'INPUT' || tagName === 'TEXTAREA') {
            try {
                selectionStart = activeElement.selectionStart;
                selectionEnd = activeElement.selectionEnd;
                selectionDirection = activeElement.selectionDirection;
            } catch (focusError) {}

            if (activeElementId === 'pwdIn' || activeElement.type === 'password') isPasswordFocused = true;
            else if (activeElementId === 'usernameIn' || activeElementId === 'phoneIn') isUsernameFocused = true;
        }
    }

    try { deepCoreRender(); } 
    catch (renderError) { console.error("[Fatal Error] Inner render failed:", renderError); }

    // Re-bind Media Observer on new DOM nodes
    MediaController.observe();

    if (activeElementId || isPasswordFocused || isUsernameFocused) {
        let targetElement = null;
        if (activeElementId) targetElement = document.getElementById(activeElementId);
        if (!targetElement) {
            if (isPasswordFocused) targetElement = document.getElementById('pwdIn') || document.querySelector('input[type="password"]');
            else if (isUsernameFocused) targetElement = document.getElementById('usernameIn') || document.getElementById('phoneIn');
        }
        if (targetElement) {
            try {
                targetElement.focus();
                if (selectionStart !== null && selectionEnd !== null) {
                    targetElement.setSelectionRange(selectionStart, selectionEnd, selectionDirection);
                }
            } catch (recoveryError) {}
        }
    }
}

(function initializeFocusStabilizer() {
    document.addEventListener('DOMContentLoaded', () => {
        const observerTarget = document.body;
        const config = { childList: true, subtree: true };
        const observer = new MutationObserver(() => {
            if (CoreStore.getState().page === 'login') {
                const passwordField = document.getElementById('pwdIn');
                if (passwordField && document.activeElement !== passwordField && CoreStore.getState().pwdIn?.length > 0) {
                    if (CoreStore.getState().lastActiveInput === 'password') {
                        setTimeout(() => { passwordField.focus(); }, 1);
                    }
                }
            }
        });
        observer.observe(observerTarget, config);
    });

    document.addEventListener('input', (e) => {
        if (e.target) {
            if (e.target.id === 'pwdIn') CoreStore.dispatch({ type: 'MUTATE', payload: { key: 'lastActiveInput', value: 'password' }});
            else if (e.target.id === 'usernameIn' || e.target.id === 'phoneIn') CoreStore.dispatch({ type: 'MUTATE', payload: { key: 'lastActiveInput', value: 'username' }});
        }
    }, true);
})();

/* ===== BOOT ===== */
(function boot(){
  const u=loadUser();
  if(u&&u.firstName){
    S.user=u;S.nav='home';S.page='home';
    const c=COUNTRIES.find(x=>u.phone?.startsWith(x.code.trim()));if(c)S.country=c;
  } else {
    S.country=COUNTRIES[0];
  }
  // The state initialization above via Proxy traps will automatically schedule a render.
  RenderEngine.schedule(); 
})();
</script>
