<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Fightgram</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--bg2:#0f0f1a;--bg3:#161625;--bg4:#1e1e30;
  --surface:#1a1a2e;--surface2:#22223a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0ff;--text2:#9090b0;--text3:#5a5a7a;
  --accent:#7c3aed;--accent2:#a855f7;--accent3:#c084fc;
  --gold:#f59e0b;--red:#ef4444;--green:#10b981;--cyan:#06b6d4;--pink:#ec4899;--orange:#f97316;
  --g1:linear-gradient(135deg,#7c3aed,#ec4899);
  --g2:linear-gradient(135deg,#06b6d4,#7c3aed);
  --g3:linear-gradient(135deg,#f59e0b,#ef4444);
  --r:12px;--rsm:8px;--rlg:20px;--rxl:28px;
  --sh:0 2px 8px rgba(0,0,0,.4);--shm:0 8px 32px rgba(0,0,0,.5);--shl:0 20px 60px rgba(0,0,0,.6);
  --sha:0 0 40px rgba(124,58,237,.3);
  --fd:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;--fm:'JetBrains Mono',monospace;
  --nh:60px;--bh:56px;
}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input{font-family:inherit}
img{display:block;max-width:100%}
video{display:block}
::selection{background:rgba(124,58,237,.35);color:#fff}
body::before{content:'';position:fixed;inset:0;opacity:.3;pointer-events:none;z-index:9999;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.05'/%3E%3C/svg%3E")}
.amb{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ab{position:absolute;border-radius:50%;filter:blur(120px);opacity:.1}
.ab1{width:600px;height:600px;background:var(--accent);top:-200px;left:-100px;animation:af1 22s ease-in-out infinite}
.ab2{width:500px;height:500px;background:var(--pink);bottom:-150px;right:-100px;animation:af2 26s ease-in-out infinite}
.ab3{width:350px;height:350px;background:var(--cyan);top:50%;left:50%;transform:translate(-50%,-50%);animation:af3 18s ease-in-out infinite}
@keyframes af1{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,40px)}}
@keyframes af2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-50px)}}
@keyframes af3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.2)}}
.page{position:relative;z-index:1;animation:pfi .35s ease}
@keyframes pfi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ===== AUTH FIX - layout uses flex column ===== */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1}
.auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rxl);padding:44px 38px;width:100%;max-width:420px;box-shadow:var(--shl),var(--sha);position:relative;overflow:hidden;display:flex;flex-direction:column}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--g1)}
.auth-logo-text{font-family:var(--fd);font-size:52px;letter-spacing:6px;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;text-align:center}
.auth-logo-sub{font-size:11px;color:var(--text3);letter-spacing:4px;text-transform:uppercase;margin-top:4px;font-family:var(--fm);text-align:center;margin-bottom:32px}
.auth-title{font-size:20px;font-weight:600;margin-bottom:6px;text-align:left}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:26px;line-height:1.5;text-align:left}
.fg{margin-bottom:16px;width:100%}
.fl{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:7px;letter-spacing:.5px;text-transform:uppercase}
.fi{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);padding:13px 16px;color:var(--text);font-size:15px;outline:none;transition:all .2s;display:block}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.fi::placeholder{color:var(--text3)}
.fi.err{border-color:var(--red)}
.ferr{font-size:12px;color:var(--red);margin-top:5px}
.phone-row{display:flex;gap:8px;width:100%}
.csel{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);padding:0 12px;color:var(--text);font-size:14px;display:flex;align-items:center;gap:6px;white-space:nowrap;min-width:108px;position:relative;cursor:pointer;transition:all .2s;height:50px;flex-shrink:0}
.csel.open{border-color:var(--accent)}
.cdrop{position:absolute;top:calc(100% + 6px);left:0;width:220px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);overflow-y:auto;max-height:220px;z-index:200;box-shadow:var(--shm)}
.copt{padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s;font-size:13px}
.copt:hover{background:var(--surface2)}
.phone-inp{flex:1;min-width:0}
.phone-inp .fi{width:100%}
.rel{position:relative}
.pwd-eye{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--text3);cursor:pointer;transition:color .2s;display:flex;align-items:center;background:none;border:none}
.pwd-eye:hover{color:var(--text2)}
.str-wrap{margin-top:7px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.str-bar{height:100%;border-radius:2px;transition:width .4s,background .4s}
.str-label{font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--fm)}
.btn-p{width:100%;padding:14px;border-radius:var(--r);background:var(--g1);color:#fff;font-size:15px;font-weight:600;letter-spacing:.4px;transition:all .2s;position:relative;overflow:hidden;margin-top:6px;border:none;cursor:pointer}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,58,237,.4)}
.btn-p:active{transform:translateY(0)}
.btn-p::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent)}
.btn-s{width:100%;padding:13px;border-radius:var(--r);background:var(--bg3);border:1.5px solid var(--border2);color:var(--text);font-size:15px;font-weight:500;transition:all .2s;margin-top:8px;cursor:pointer}
.btn-s:hover{border-color:var(--accent);background:var(--surface)}

/* ===== FOLLOW PAGE ===== */
.fpage{min-height:100vh;padding:32px 20px 40px;max-width:480px;margin:0 auto;position:relative;z-index:1}
.ftitle{font-family:var(--fd);font-size:36px;letter-spacing:2px;text-align:center;margin-bottom:6px}
.ftitle span{background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.fsub{color:var(--text2);font-size:13px;text-align:center;margin-bottom:20px;line-height:1.5}
.fnotice{display:flex;align-items:center;gap:8px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);border-radius:var(--r);padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--accent3)}
.flist{display:flex;flex-direction:column;gap:6px;margin-bottom:20px;max-height:55vh;overflow-y:auto}
.fitem{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--border);transition:all .2s;cursor:pointer}
.fitem:hover{border-color:var(--border2);background:var(--bg3)}
.fitem.followed{border-color:rgba(124,58,237,.4);background:rgba(124,58,237,.05)}
.fname{font-weight:500;font-size:14px;flex:1}
.fvids{font-size:11px;color:var(--text3);font-family:var(--fm);margin-top:2px}
.fbtn{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;transition:all .2s;flex-shrink:0;cursor:pointer;border:none}
.fbtn.un{background:transparent;border:1.5px solid var(--border2);color:var(--text2)}
.fbtn.fo{background:var(--g1);color:#fff}
.fbtn.fo:hover{box-shadow:0 4px 16px rgba(124,58,237,.4)}

/* ===== TOP BAR ===== */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(8,8,16,.88);backdrop-filter:blur(20px) saturate(1.5);border-bottom:1px solid var(--border)}
.tbi{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:var(--nh)}
.brand{display:flex;align-items:center;gap:8px}
.brand-text{font-family:var(--fd);font-size:30px;letter-spacing:4px;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.tactions{display:flex;align-items:center;gap:6px}
.ibtn{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text2);background:var(--bg3);border:1px solid var(--border);transition:all .2s}
.ibtn:hover{color:var(--text);border-color:var(--accent);background:var(--surface);box-shadow:0 0 14px rgba(124,58,237,.2)}
.ibtn.act{color:var(--accent3);border-color:var(--accent);background:rgba(124,58,237,.1)}
.ibtn svg{width:20px;height:20px;fill:currentColor}

/* ===== FILTER BAR ===== */
.fbar{display:flex;align-items:center;gap:8px;padding:0 18px;height:var(--bh);overflow-x:auto;scrollbar-width:none;border-top:1px solid var(--border)}
.fbar::-webkit-scrollbar{display:none}
.fbar-label{font-size:11px;font-family:var(--fm);color:var(--text3);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.fchip{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;transition:all .2s;cursor:pointer;flex-shrink:0;background:var(--bg3);border:1.5px solid var(--border);color:var(--text2)}
.fchip:hover{border-color:var(--accent3);color:var(--text)}
.fchip.act{background:var(--g1);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(124,58,237,.35)}

/* ===== PREMIUM FLOATING BOTTOM NAV BAR ===== */
.botnav {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 32px);
  max-width: 450px;
  z-index: 999;
  background: rgba(15, 15, 26, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: space-around;
  height: auto;
  padding: 6px 10px;
  padding-bottom: calc(6px + env(safe-area-inset-bottom, 16px));
  box-shadow: var(--shl), 0 10px 30px rgba(0,0,0,0.5);
}
.ni {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  padding: 0;
  border-radius: 12px;
  min-width: 48px;
  min-height: 48px;
  height: 48px;
  position: relative;
}
.ni:hover {
  background: rgba(255, 255, 255, 0.05);
}
.ni.act {
  color: var(--accent3);
}
.ni-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  width: 24px;
  height: 24px;
}
.ni-icon svg {
  width: 24px;
  height: 24px;
  fill: currentColor;
}
.ni.act .ni-icon {
  transform: scale(1.15);
  color: var(--red);
}
.ni-lbl {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .5px;
  text-transform: uppercase;
  margin-top: 2px;
  display: none; /* Immersive look focuses heavily on iconic layout */
}
.ni.act .ni-lbl {
  color: var(--accent3);
}
.ni:not(.act) .ni-lbl {
  color: var(--text3);
}
.ni:not(.act) .ni-icon {
  color: var(--text2);
}

/* ===== STORIES ===== */
.stories-sec{padding:14px 18px 6px;margin-top:calc(var(--nh) + var(--bh));}
.stories-scroll{display:flex;gap:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;touch-action:pan-x}
.stories-scroll::-webkit-scrollbar{display:none}
.stories-scroll{overscroll-behavior-x:contain}
.sitem{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;width:72px}
.savtr-wrap{position:relative;width:72px;height:72px}
.savtr{width:64px;height:64px;border-radius:50%;object-fit:cover;position:absolute;top:4px;left:4px}
.savtr-ph{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;color:#fff;position:absolute;top:4px;left:4px}
.story-ring{position:absolute;top:0;left:0;width:72px;height:72px;pointer-events:none}
.sname{font-size:11px;color:var(--text2);width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.add-story-dot{position:absolute;bottom:2px;right:2px;width:20px;height:20px;border-radius:50%;background:var(--g1);display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid var(--bg);z-index:2;color:#fff}

/* ===== STORY VIEWER ===== */
.sv{position:fixed;inset:0;z-index:600;background:#000;display:flex;flex-direction:column;overscroll-behavior:none}
.sv-prog{display:flex;gap:4px;padding:14px 14px 8px;position:relative;z-index:2}
.sv-seg{flex:1;height:3px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden}
.sv-fill{height:100%;border-radius:2px;background:#fff;transition:width .1s linear}
.sv-fill.done{width:100%!important}
.sv-fill.pend{width:0!important}
.sv-head{display:flex;align-items:center;justify-content:space-between;padding:0 14px 12px;position:relative;z-index:2}
.sv-person{display:flex;align-items:center;gap:10px;cursor:pointer}
.sv-mavtr{width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,.7);object-fit:cover;flex-shrink:0}
.sv-pname{font-weight:600;font-size:14px;color:#fff}
.sv-time{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px;font-family:var(--fm)}
.sv-close{font-size:26px;color:rgba(255,255,255,.85);cursor:pointer;padding:4px;line-height:1;background:none;border:none;display:flex;align-items:center}
.sv-close svg{width:22px;height:22px;fill:currentColor}
.sv-media{flex:1;position:relative;overflow:hidden}
.sv-media video,.sv-media img{width:100%;height:100%;object-fit:contain}
.sv-tap-l,.sv-tap-r{position:absolute;top:0;bottom:0;width:40%;z-index:10;cursor:pointer}
.sv-tap-l{left:0}
.sv-tap-r{right:0}
.sv-gtop{position:absolute;top:0;left:0;right:0;height:180px;background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);pointer-events:none;z-index:1}
.sv-gbot{position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(to top,rgba(0,0,0,.6),transparent);pointer-events:none;z-index:1}

/* ===== FEED ===== */
.feed-sec{padding:10px 18px 100px}
.feed-grid{display:grid;gap:14px}
@media(min-width:580px){.feed-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.feed-grid{grid-template-columns:repeat(3,1fr)}}
.vc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden;transition:all .25s;cursor:pointer;position:relative}
.vc:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shm)}
.vc-thumb{position:relative;aspect-ratio:16/9;background:var(--bg3);overflow:hidden}
.vc-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.vc:hover .vc-thumb img{transform:scale(1.04)}
.vc-thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3)}
.vc-thumb-ph svg{width:44px;height:44px;fill:currentColor;opacity:.4}
.vc-dur{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);padding:3px 8px;border-radius:6px;font-size:12px;font-family:var(--fm)}
.vc-fmt{position:absolute;top:10px;left:10px;background:var(--g1);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.4px}
.vc-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.vc:hover .vc-play{opacity:1}
.vc-play-btn{width:52px;height:52px;border-radius:50%;background:rgba(124,58,237,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center}
.vc-play-btn svg{width:22px;height:22px;fill:#fff;margin-left:3px}
.vc-info{padding:12px 15px 14px}
.vc-prow{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.vc-pavtr{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0}
.vc-pname{font-size:13px;color:var(--accent3);font-weight:500;cursor:pointer}
.vc-pname:hover{text-decoration:underline}
.vc-date{font-size:11px;color:var(--text3);font-family:var(--fm);margin-left:auto}
.vc-title{font-size:15px;font-weight:600;line-height:1.3;margin-bottom:9px}
.vc-tags{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.vc-tag{padding:3px 9px;border-radius:6px;font-size:11px;font-family:var(--fm);background:rgba(124,58,237,.12);color:var(--accent3);border:1px solid rgba(124,58,237,.2);display:flex;align-items:center;gap:4px}
.vc-tag svg{width:12px;height:12px;fill:currentColor}

/* ===== IMMERSIVE REELS ARCHITECTURE ===== */
.reels-page {
  padding: 0 !important;
  margin: 0 !important;
}
.reels-container {
  height: 100vh;
  height: 100dvh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  overscroll-behavior-y: contain;
  background: #000;
  scrollbar-width: none; /* Hide scrollbar Firefox */
  -ms-overflow-style: none; /* Hide scrollbar IE/Edge */
}
.reels-container::-webkit-scrollbar {
  display: none; /* Hide scrollbar Chrome/Safari */
  width: 0;
  height: 0;
}
.reels-header {
  position: fixed;
  top: 14px;
  left: 0;
  right: 0;
  z-index: 500;
  padding: 0 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  pointer-events: none;
}
.reels-title, .reels-count {
  pointer-events: auto;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}
.reels-title {
  font-family: var(--fd);
  font-size: 28px;
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: #fff;
}
.rdot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--red);
  animation: rp 1.5s ease infinite;
  flex-shrink: 0;
}
@keyframes rp {0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.7}}
.reels-count {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  font-family: var(--fm);
}

.reels-grid {
  display: block;
  padding: 0;
}

.reel-card {
  height: 100vh;
  height: 100dvh;
  width: 100%;
  scroll-snap-align: start;
  position: relative;
  background: #000;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.reel-card video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  inset: 0;
  z-index: 1;
  background: #000;
}
.reel-card img {
  display: none;
}
.reel-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 24px 20px 110px;
  z-index: 3;
  pointer-events: none;
}
.reel-title {
  font-size: 15px;
  font-weight: 500;
  color: #fff;
  line-height: 1.4;
  margin-bottom: 12px;
  max-width: 80%;
  pointer-events: auto;
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.reel-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  pointer-events: auto;
}
.reel-avtr {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(255, 255, 255, 0.8);
}
.reel-pname {
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.reel-views {
  font-size: 12px;
  color: rgba(255, 255, 255, 0.8);
  font-family: var(--fm);
  display: flex;
  align-items: center;
  gap: 4px;
  background: rgba(0, 0, 0, 0.4);
  padding: 4px 10px;
  border-radius: 20px;
  backdrop-filter: blur(4px);
}
.reel-views svg {
  width: 12px;
  height: 12px;
  fill: currentColor;
}
.reel-dur {
  position: absolute;
  top: 70px;
  right: 18px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-family: var(--fm);
  color: #fff;
  z-index: 3;
}
.reel-play {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
  background: rgba(0,0,0,0.15);
  z-index: 2;
  pointer-events: none;
}
.reel-play-btn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: rgba(124, 58, 237, 0.8);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  transform: scale(0.9);
  transition: transform 0.2s;
}
.reel-play-btn svg {
  width: 24px;
  height: 24px;
  fill: #fff;
  margin-left: 4px;
}

/* ===== PREMIUM CUSTOM VIDEO PLAYER WRAP ===== */
.vplayer-wrap {
  position: relative;
  width: 100%;
  border-radius: var(--rlg);
  overflow: hidden;
  background: #000;
  aspect-ratio: 16/9;
}
.vplayer-wrap video {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: contain;
}
.video-controls-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 30px 16px 16px;
  background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.4) 60%, rgba(0, 0, 0, 0) 100%);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
  z-index: 10;
}
.vplayer-wrap:hover .video-controls-overlay,
.vplayer-wrap.paused .video-controls-overlay,
.vplayer-wrap.show-controls .video-controls-overlay {
  opacity: 1;
  pointer-events: auto;
}
/* Micro-interaction setup */
.vplayer-timeline-container {
  position: relative;
  padding: 8px 0;
  cursor: pointer;
  pointer-events: auto;
}
.vplayer-timeline {
  position: relative;
  height: 4px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 2px;
  transition: height 0.1s ease;
  width: 100%;
}
.vplayer-timeline-container:hover .vplayer-timeline {
  height: 6px;
}
.vplayer-buf {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: rgba(255, 255, 255, 0.15);
  border-radius: 2px;
  width: 0%;
}
.vplayer-progress {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: linear-gradient(90deg, #ef4444, #ff2a2a); /* striking crimson accent */
  border-radius: 2px;
  width: 0%;
}
.vplayer-thumb {
  position: absolute;
  top: 50%;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
  transform: translate(-50%, -50%) scale(0);
  transition: transform 0.1s ease;
  pointer-events: none;
}
.vplayer-timeline-container:hover .vplayer-thumb {
  transform: translate(-50%, -50%) scale(1);
}

.vplayer-controls {
  display: flex;
  align-items: center;
  margin-top: 10px;
  gap: 14px;
}
.vplayer-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  transition: transform 0.2s, color 0.2s;
  pointer-events: auto;
}
.vplayer-btn:hover {
  color: var(--red);
  transform: scale(1.08);
}
.vplayer-btn svg {
  width: 20px;
  height: 20px;
  fill: currentColor;
}
.vplayer-vol {
  display: flex;
  align-items: center;
  gap: 8px;
}
.vplayer-vol-slider {
  width: 60px;
  height: 4px;
  -webkit-appearance: none;
  background: rgba(255,255,255,0.3);
  border-radius: 2px;
  outline: none;
  pointer-events: auto;
}
.vplayer-vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
}
.vplayer-time {
  font-size: 12px;
  font-family: var(--fm);
  color: rgba(255, 255, 255, 0.8);
}
.vplayer-spacer {
  flex: 1;
}
.vplayer-big-play {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  z-index: 5;
  pointer-events: none; /* Let single/double taps pass to the wrapper layer */
}
.vplayer-big-play-btn {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: rgba(15, 15, 26, 0.7);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: scale(0.8);
  transition: all 0.3s ease;
  color: #fff;
}
.vplayer-wrap.paused .vplayer-big-play-btn {
  opacity: 1;
  transform: scale(1);
}
.vplayer-big-play-btn svg {
  width: 26px;
  height: 26px;
  fill: currentColor;
  margin-left: 4px;
}

/* Gesture Interaction Layer */
.vplayer-gesture-layer {
  position: absolute;
  inset: 0;
  z-index: 4;
  pointer-events: auto; /* Handles vital single-taps and quick double-taps */
}

/* ===== SEARCH OVERLAY ===== */
.srch-ov{position:fixed;inset:0;z-index:400;background:rgba(8,8,16,.96);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;padding:70px 18px 20px;animation:pfi .2s ease}
.srch-box{width:100%;max-width:560px;position:relative}
.srch-inp{width:100%;background:var(--bg3);border:2px solid var(--accent);border-radius:var(--rlg);padding:15px 48px 15px 20px;color:var(--text);font-size:17px;outline:none;box-shadow:0 0 30px rgba(124,58,237,.25);font-family:var(--fb)}
.srch-inp::placeholder{color:var(--text3)}
.srch-x{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text2);cursor:pointer;padding:4px;background:none;border:none;display:flex;align-items:center}

.srch-results{width:100%;max-width:560px;margin-top:18px;display:flex;flex-direction:column;gap:6px}
.srch-tags{width:100%;max-width:560px;margin-top:16px}

.sres-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .2s}

/* ===== CAT OVERLAY ===== */
.cat-ov{position:fixed;inset:0;z-index:400;background:rgba(8,8,16,.96);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;padding:0;overflow-y:auto;animation:pfi .2s ease}

const AC=['#7c3aed','#ec4899','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6','#f97316'];
const ac=(id)=>AC[id.charCodeAt(id.length-1)%AC.length];
const ini=(n)=>n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const fmtDate=(ts)=>{const d=(Date.now()-ts)/1000;if(d<60)return'now';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';};
const fmtViews=(v)=>v>=1000?(v/1000).toFixed(1)+'K':String(v);
const fmtSecs=(s)=>{s=Math.floor(s||0);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}

function toast(msg){
  if(S.toastTimer)clearTimeout(S.toastTimer);
  S.toastMsg=msg;
  const layer=$('toastLayer');
  if(layer){
    layer.innerHTML=`<div style="position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(239,68,68,0.95);color:#fff;padding:12px 24px;border-radius:30px;font-size:14px;font-weight:600;z-index:99999;box-shadow:var(--shl);white-space:nowrap;backdrop-filter:blur(10px)">${msg}</div>`;
  }
  S.toastTimer=setTimeout(()=>{
    if(layer)layer.innerHTML='';
    S.toastMsg=null;
  },3000);
}

/* ===== RENDERING ARCHITECTURE ===== */
function avHTML(url,name,id,sz=40,cls=''){
  if(url)return `<img src="${url}" class="${cls}" style="width:${sz}px;height:${sz}px;border-radius:50%;object-fit:cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="${cls}" style="display:none;width:${sz}px;height:${sz}px;border-radius:50%;background:${ac(id)};align-items:center;justify-content:center;font-weight:700;font-size:${sz*0.38}px;color:#fff">${ini(name)}</div>`;
  return `<div class="${cls}" style="display:flex;width:${sz}px;height:${sz}px;border-radius:50%;background:${ac(id)};align-items:center;justify-content:center;font-weight:700;font-size:${sz*0.38}px;color:#fff">${ini(name)}</div>`;
}

function ringsSVG(pid,sz=72){
  return `<svg class="story-ring" viewBox="0 0 72 72"><circle cx="36" cy="36" r="33" stroke="url(#gStory)" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg><svg style="width:0;height:0"><defs><linearGradient id="gStory" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#ef4444"/></linearGradient></defs></svg>`;
}

function validStories(pid){
  if(pid==='__me__') return S.user?.stories||[];
  const p=PEOPLE.find(x=>x.id===pid);return p?.stories||[];
}

function sortMedia(arr,sort){
  const res=[...arr];
  if(sort==='newest')return res.sort((a,b)=>b.date-a.date);
  if(sort==='popular')return res.sort((a,b)=>b.views-a.views);
  return res;
}

      <div class="sv-person" id="svPersonLink" data-person="${p?.id||'me'}">
        ${avHTML(p?.avatar||p?.avatarUrl,p?.name||p?.firstName||'User',p?.id||'me',38,'sv-mavtr')}
        <div><div class="sv-pname">${p?.name||p?.firstName}</div><div class="sv-time">${fmtDate(story.date)}</div></div>

      <div class="sv-gtop"></div><div class="sv-gbot"></div>

  </div>`;
}

/* ===== MAIN DRIVER ENGINE ===== */
function render(){
  const root=$('root');
  if(S.page==='login')root.innerHTML=renderLogin();
  else if(S.page==='register')root.innerHTML=renderRegister();
  else if(S.page==='follow')root.innerHTML=renderFollowPage();
  else if(S.page==='home')root.innerHTML=renderHome();
  else if(S.page==='reels')root.innerHTML=renderReelsPage();
  else if(S.page==='profile')root.innerHTML=renderProfilePage();
  else if(S.page==='editProfile')root.innerHTML=renderEditProfile();
  else if(S.page==='person')root.innerHTML=renderPersonPage();

  $('srchLayer').innerHTML=renderSearchOverlay();
  $('catLayer').innerHTML=renderCatOverlay();
  $('vmovLayer').innerHTML=renderVideoModal();
  $('svLayer').innerHTML=renderStoryViewer();

  bindEvents();
  initImmersiveOptimizations();
}

/* ===== ADVANCED GESTURE & REELS PERFORMANCE OPTIMIZATIONS ===== */
function initImmersiveOptimizations() {
  // Intersection Observer implementation for Snap Scroll snapping elements
  const container = $('reelsContainer');
  if (container) {
    const cards = document.querySelectorAll('.reels-container .reel-card');
    if ('IntersectionObserver' in window && cards.length > 0) {
      const observerOptions = {
        root: container,
        rootMargin: '0px',
        threshold: 0.75 // Trigger strictly when 75% visible or higher
      };

      const reelObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const video = entry.target.querySelector('video');
          if (!video) return;
          if (entry.isIntersecting) {
            // Visible card plays
            video.play().catch(() => {});
            entry.target.classList.remove('paused');
          } else {
            // Offscreen card pauses and resets to start frame to preserve resources/bandwidth
            video.pause();
            video.currentTime = 0;
            entry.target.classList.remove('paused');
          }
        });
      }, observerOptions);

      cards.forEach(card => reelObserver.observe(card));
    }

    // Double tap trigger implementation for snap reels gesture layer
    cards.forEach(card => {
      const gestureLayer = card.querySelector('.vplayer-gesture-layer');
      const video = card.querySelector('video');
      if (!gestureLayer || !video) return;

      let lastTap = 0;
      gestureLayer.addEventListener('click', (e) => {
        const now = Date.now();
        if (now - lastTap < 300) {
          // Double tap detected -> Trigger premium Like micro-interaction
          createHeartBurst(e, card);
        } else {
          // Single tap -> Toggle state explicitly
          setTimeout(() => {
            if (Date.now() - lastTap >= 300) {
              if (video.paused) {
                video.play().catch(() => {});
                card.classList.remove('paused');
              } else {
                video.pause();
                card.classList.add('paused');
              }
            }
          }, 200);
        }
        lastTap = now;
      });
    });
  }

  // Event handlers for full production custom video player wrap
  const vid = $('vmVideo');
  if (vid) {
    const wrap = $('vplayer');
    const gestureLayer = wrap.querySelector('.vplayer-gesture-layer');
    
    let lastTap = 0;
    if (gestureLayer) {
      gestureLayer.addEventListener('click', (e) => {
        const now = Date.now();
        if (now - lastTap < 300) {
          // Double Tap on full layout modal -> Burst animation
          createHeartBurst(e, wrap);
        } else {
          // Single Tap on full player modal -> Fade control layer dynamically via class
          setTimeout(() => {
            if (Date.now() - lastTap >= 300) {
              wrap.classList.toggle('show-controls');
            }
          }, 200);
        }
        lastTap = now;
      });
    }
  }
}

function createHeartBurst(e, container) {
  const heart = document.createElement('div');
  heart.className = 'heart-burst-icon';
  heart.innerHTML = `<svg viewBox="0 0 24 24" style="width:100%;height:100%;fill:currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
  
  // Positional calculations inside viewport matching coordinate transforms
  const rect = container.getBoundingClientRect();
  const x = e.clientX - rect.left - 40;
  const y = e.clientY - rect.top - 40;
  
  heart.style.left = `${x}px`;
  heart.style.top = `${y}px`;
  
  container.appendChild(heart);
  setTimeout(() => heart.remove(), 600);
  toast('Highlight Liked!');
}

/* ===== WIRE EVENT BINDINGS ===== */
function bindEvents(){
  // Navigation Routing System Interceptors
  $$('.botnav .ni').forEach(el=>{
    el.addEventListener('click',()=>{
      const n=el.dataset.n;S.nav=n;S.page=n;
      if(n==='home'){S.cat=null;}
      render();
    });
  });

  // Top header button toggles
  $('tbSrch')?.addEventListener('click',()=>{S.searchOpen=true;render();$('srchInp')?.focus();});
  $('tbCat')?.addEventListener('click',()=>{S.catOpen=true;render();});

  // Sort bar selectors
  $$('.fbar .fchip').forEach(el=>{
    el.addEventListener('click',()=>{S.feedFilter=el.dataset.f;render();});
  });

  // Category overlays
  $('catX')?.addEventListener('click',()=>{S.catOpen=false;render();});
  $('catItemAll')?.addEventListener('click',()=>{S.cat=null;S.catOpen=false;render();});
  $$('.cat-item[data-cid]').forEach(el=>{
    el.addEventListener('click',()=>{S.cat=el.dataset.cid;S.catOpen=false;render();});
  });

  // Main search controls
  $('srchX')?.addEventListener('click',()=>{S.searchOpen=false;S.searchQ='';render();});
  $('srchInp')?.addEventListener('input',e=>{S.searchQ=e.target.value;render();$('srchInp').focus();});
  $$('.srch-tag-chip').forEach(el=>{
    el.addEventListener('click',()=>{S.searchQ=el.dataset.tag;render();$('srchInp').focus();});
  });

  // Authentication Interface Logic Bindings
  $('loginCsel')?.addEventListener('click',(e)=>{e.stopPropagation();S.countryOpen=!S.countryOpen;render();});
  $$('.cdrop .copt').forEach(el=>{
    el.addEventListener('click',(e)=>{e.stopPropagation();S.country=COUNTRIES[el.dataset.idx];S.countryOpen=false;render();});
  });
  document.addEventListener('click',()=>{if(S.countryOpen){S.countryOpen=false;render();}});

  $('phoneIn')?.addEventListener('input',e=>{S.phoneIn=e.target.value;});
  $('pwdIn')?.addEventListener('input',e=>{S.pwdIn=e.target.value;});
  $('pwdEye')?.addEventListener('click',()=>{S.pwdVis=!S.pwdVis;render();});

  $('loginSubmit')?.addEventListener('click',()=>{
    if(!S.phoneIn){S.errors.phone='Enter active line';render();return;}
    if(!S.pwdIn){S.errors.pwd='Enter password';render();return;}
    S.user={username:'arena_warrior',firstName:'Challenger',lastName:'',avatar:'',bio:'Fightgram striking enthusiast.',phone:S.phoneIn,following:['p1','Mmma']};
    S.page='follow';render();
  });

  $('toRegister')?.addEventListener('click',()=>{S.page='register';render();});
  $('toLogin')?.addEventListener('click',()=>{S.page='login';render();});

  $('regUser')?.addEventListener('input',e=>{S.usernameIn=e.target.value;});
  $('regFirst')?.addEventListener('input',e=>{S.firstIn=e.target.value;});
  $('regPwd')?.addEventListener('input',e=>{S.pwdIn=e.target.value;});
  $('regPwdEye')?.addEventListener('click',()=>{S.pwdVis=!S.pwdVis;render();});

  $('regSubmit')?.addEventListener('click',()=>{
    if(!S.usernameIn){S.errors.username='Username required';render();return;}
    if(!S.firstIn){S.errors.firstName='First name required';render();return;}
    S.user={username:S.usernameIn,firstName:S.firstIn,lastName:'',avatar:'',bio:'',phone:'+1000000',following:[]};
    S.page='follow';render();
  });

  $('fNext')?.addEventListener('click',()=>{S.page='home';S.nav='home';render();});
  $$('.flist .fitem').forEach(el=>{
    el.addEventListener('click',()=>{
      const pid=el.dataset.pid;if(!S.user.following)S.user.following=[];
      if(S.user.following.includes(pid))S.user.following=S.user.following.filter(x=>x!==pid);
      else S.user.following.push(pid);
      render();
    });
  });

  // Story Navigation mechanics 
  $('myStoryBtn')?.addEventListener('click',()=>{
    S.user.stories=[{id:'mys1',link:'https://www.w3schools.com/html/movie.mp4',date:Date.now(),type:'video'}];
    S.sv={pid:'__me__',si:0};render();
  });
  $$('.sitem[data-spid]').forEach(el=>{
    el.addEventListener('click',()=>{S.sv={pid:el.dataset.spid,si:0};render();});
  });

  function advStory(dir){
    if(!S.sv)return;const list=validStories(S.sv.pid);
    if(S.sv.si+dir>=0 && S.sv.si+dir<list.length){S.sv.si+=dir;render();}
    else {S.sv=null;render();}
  }

  $('svClose')?.addEventListener('click',()=>{S.sv=null;render();});
  $('svTapL')?.addEventListener('click',(e)=>{e.stopPropagation();advStory(-1);});
  $('svTapR')?.addEventListener('click',(e)=>{e.stopPropagation();advStory(1);});
  
  const svVid=$('svVideo');
  if(svVid){
    svVid.addEventListener('timeupdate',()=>{
      const fill=document.getElementById(`svFill${S.sv?.si}`);
      if(fill&&svVid.duration){fill.style.width=(svVid.currentTime/svVid.duration*100)+'%';}
    });
    svVid.addEventListener('ended',()=>advStory(1));
    svVid.play().catch(()=>{});
  }

  // Profile View actions
  $('profEditBtn')?.addEventListener('click',()=>{S.page='editProfile';render();});
  $('profLogoutBtn')?.addEventListener('click',()=>{S.user=null;S.page='login';S.nav='home';render();});
  $('editBack')?.addEventListener('click',()=>{S.page='profile';render();});
  $('epSave')?.addEventListener('click',()=>{
    if($('epFirst').value)S.user.firstName=$('epFirst').value;
    S.user.username=$('epUsername').value;S.user.bio=$('epBio').value;
    S.page='profile';render();
  });

  // Creator profile transitions
  $$('.vc,.sres-item').forEach(card=>{
    card.addEventListener('click',e=>{
      if(e.target.closest('.vc-pname'))return;
      S.videoId=card.dataset.mid;render();
    });
  });

  $$('.vc-pname').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();S.personId=el.dataset.person;S.personSort='newest';S.page='person';render();
    });
  });
  $('ppBack')?.addEventListener('click',()=>{S.page='home';render();});
  $$('.pp-sort-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{S.personSort=btn.dataset.sort;render();});
  });
  $('ppFwBtn')?.addEventListener('click',()=>{
    const pid=$('ppFwBtn').dataset.person;
    if(S.user.following.includes(pid))S.user.following=S.user.following.filter(x=>x!==pid);
    else S.user.following.push(pid);
    render();
  });

  // Custom Video Player Controller Core Logic Bindings
  $('vmovX')?.addEventListener('click',()=>{S.videoId=null;render();});
  const vid=$('vmVideo');
  if(vid){
    const wrap=$('vplayer');
    const progEl=$('vpProgress');
    const bufEl=$('vpBuf');
    const thumbEl=$('vpThumb');
    const timeEl=$('vpTime');
    const playBtn=$('vpPlay');
    const muteBtn=$('vpMute');
    const volSlider=$('vpVol');
    const fullBtn=$('vpFull');
    const timelineContainer=$('vpTimelineContainer');

    wrap.addEventListener('click',(e)=>{
      if(e.target.closest('.video-controls-overlay') || e.target.closest('#vpBigPlayBtn')) return;
      if(vid.paused){vid.play().catch(()=>{});wrap.classList.remove('paused');}
      else {vid.pause();wrap.classList.add('paused');}
    });

    $('vpBigPlayBtn')?.addEventListener('click',(e)=>{
      e.stopPropagation();vid.play().catch(()=>{});wrap.classList.remove('paused');
    });

    playBtn?.addEventListener('click',(e)=>{
      e.stopPropagation();
      if(vid.paused){vid.play().catch(()=>{});playBtn.innerHTML=IC.pause;wrap.classList.remove('paused');}
      else {vid.pause();playBtn.innerHTML=IC.play;wrap.classList.add('paused');}
    });

    vid.addEventListener('play',()=>{playBtn.innerHTML=IC.pause;wrap.classList.remove('paused');});
    vid.addEventListener('pause',()=>{playBtn.innerHTML=IC.play;wrap.classList.add('paused');});

    vid.addEventListener('timeupdate',()=>{
      if(!vid.duration)return;const p=(vid.currentTime/vid.duration)*100;
      if(progEl)progEl.style.width=p+'%';if(thumbEl)thumbEl.style.left=p+'%';
      if(timeEl)timeEl.innerText=`${fmtSecs(vid.currentTime)} / ${fmtSecs(vid.duration)}`;
    });

    vid.addEventListener('progress',()=>{
      if(vid.buffered.length&&vid.duration && bufEl){
        const b=(vid.buffered.end(vid.buffered.length-1)/vid.duration)*100;bufEl.style.width=b+'%';
      }
    });

    timelineContainer?.addEventListener('click',e=>{
      e.stopPropagation();const rect=timelineContainer.getBoundingClientRect();
      const p=(e.clientX-rect.left)/rect.width;vid.currentTime=p*vid.duration;
    });

    muteBtn?.addEventListener('click',(e)=>{
      e.stopPropagation();vid.muted=!vid.muted;
      muteBtn.innerHTML=vid.muted?IC.vol:IC.vol; 
    });

    volSlider?.addEventListener('input',e=>{e.stopPropagation();vid.volume=e.target.value;vid.muted=(vid.volume===0);});
    fullBtn?.addEventListener('click',(e)=>{e.stopPropagation();if(vid.requestFullscreen){vid.requestFullscreen();}else if(vid.webkitRequestFullscreen){vid.webkitRequestFullscreen();}});

    vid.play().catch(()=>{});
  }
}

/* ===== HIGH ACCURACY RUNTIME STABILIZATION FOCUS ENGINE ===== */
(function initializeFocusStabilizer() {
  document.addEventListener('DOMContentLoaded', () => {
    const observerTarget = document.body;
    const config = { childList: true, subtree: true };

    const observer = new MutationObserver((mutationsList) => {
      if (window.S && window.S.page === 'login') {
        const passwordField = document.getElementById('pwdIn');
        if (passwordField && document.activeElement !== passwordField && window.S.pwdIn && window.S.pwdIn.length > 0) {
          if (window.S.lastActiveInput === 'password') {
            setTimeout(() => { passwordField.focus(); }, 1);
          }
        }
      }
    });
    observer.observe(observerTarget, config);
  });

  document.addEventListener('input', (e) => {
    if (e.target && window.S) {
      if (e.target.id === 'pwdIn') {
        window.S.lastActiveInput = 'password';
      } else if (e.target.id === 'usernameIn' || e.target.id === 'phoneIn') {
        window.S.lastActiveInput = 'username';
      }
    }
  });
})();

// Execution Entrypoint
window.onload=()=>{
  const saved=loadUser();if(saved){S.user=saved;S.page='home';S.nav='home';}
  render();
};
