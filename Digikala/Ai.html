<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>دستیار هوشمند SHOP</title>
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="icon" type="image/png" href="img/f0909d6eae7ee548665693cfbe823b078cf70ede_1774984328.png">
<style>
:root{
    --primary:#6366f1;
    --primary-hover:#4f46e5;
    --primary-soft:rgba(99,102,241,0.08);
    --secondary:#0d9488;
    --danger:#ef4444;
    --success:#10b981;
    --text-primary:#0f172a;
    --text-secondary:#475569;
    --text-muted:#94a3b8;
    --bg-body:#f8fafc;
    --bg-surface:#ffffff;
    --bg-elevated:#f1f5f9;
    --border-light:#f1f5f9;
    --border-default:#e2e8f0;
    --radius-md:12px;
    --radius-lg:16px;
    --radius-xl:20px;
    --radius-full:9999px;
    --shadow-sm:0 1px 3px rgba(15,23,42,0.06);
    --shadow-md:0 4px 12px rgba(15,23,42,0.06);
    --shadow-lg:0 10px 24px rgba(15,23,42,0.10);
    --transition:all .25s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;outline:none;}
html,body{height:100%;}
body{
    font-family:'Vazirmatn',sans-serif;
    background:var(--bg-body);
    color:var(--text-primary);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;border:none;background:none;font-family:inherit;}

/* ---------- HEADER ---------- */
.ai-header{
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border-light);
    box-shadow:var(--shadow-sm);
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
    z-index:20;
}
.ai-brand{display:flex;align-items:center;gap:10px;}
.ai-avatar{
    width:38px;height:38px;border-radius:50%;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:16px;flex-shrink:0;
    box-shadow:0 4px 12px rgba(102,126,234,0.4);
}
.ai-title{font-size:15px;font-weight:900;}
.ai-status{font-size:11px;color:var(--success);display:flex;align-items:center;gap:4px;}
.ai-status i{font-size:7px;}
.back-btn{
    display:flex;align-items:center;gap:6px;
    background:var(--bg-elevated);color:var(--text-secondary);
    padding:9px 14px;border-radius:var(--radius-md);
    font-size:12px;font-weight:700;transition:var(--transition);
}
.back-btn:hover{background:var(--primary-soft);color:var(--primary);}

/* ---------- INFO BANNER ---------- */
.ai-disclaimer{
    background:#fffbeb;border-bottom:1px solid #fde68a;
    color:#92400e;font-size:11px;padding:8px 18px;
    display:flex;align-items:center;gap:8px;flex-shrink:0;
}

/* ---------- CHAT AREA ---------- */
.chat-wrap{flex:1;overflow-y:auto;padding:18px 14px 10px;display:flex;flex-direction:column;gap:14px;}
.msg-row{display:flex;gap:10px;max-width:100%;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg-row.user{flex-direction:row-reverse;}
.msg-avatar{
    width:32px;height:32px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:13px;
}
.msg-row.bot .msg-avatar{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;}
.msg-row.user .msg-avatar{background:var(--primary-soft);color:var(--primary);}
.msg-bubble{
    max-width:78%;
    padding:12px 15px;
    border-radius:var(--radius-lg);
    font-size:13.5px;
    line-height:1.9;
    box-shadow:var(--shadow-sm);
}
.msg-row.bot .msg-bubble{background:var(--bg-surface);border:1px solid var(--border-light);border-top-right-radius:4px;}
.msg-row.user .msg-bubble{background:var(--primary);color:#fff;border-top-left-radius:4px;}
.msg-bubble p{margin-bottom:6px;}
.msg-bubble p:last-child{margin-bottom:0;}

/* action buttons inside bubble */
.msg-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.msg-action-btn{
    background:var(--primary-soft);color:var(--primary);
    padding:7px 13px;border-radius:var(--radius-full);
    font-size:11.5px;font-weight:800;transition:var(--transition);
    display:flex;align-items:center;gap:5px;
}
.msg-action-btn:hover{background:var(--primary);color:#fff;}

/* product mini card inside chat */
.chat-pcard{
    display:flex;gap:10px;background:var(--bg-elevated);
    border:1px solid var(--border-light);border-radius:var(--radius-md);
    padding:10px;margin-top:8px;align-items:center;
}
.chat-pcard img{width:52px;height:52px;object-fit:contain;background:#fff;border-radius:8px;flex-shrink:0;padding:4px;border:1px solid var(--border-light);}
.chat-pcard-info{flex:1;min-width:0;}
.chat-pcard-name{font-size:12px;font-weight:800;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.chat-pcard-price{font-size:12px;font-weight:900;color:var(--danger);margin-top:3px;}
.chat-pcard-old{font-size:10px;color:var(--text-muted);text-decoration:line-through;margin-left:4px;}
.chat-pcard-stock{font-size:10px;color:var(--text-muted);margin-top:2px;}
.chat-pcard-btn{
    background:var(--primary);color:#fff;border-radius:8px;
    padding:6px 10px;font-size:10.5px;font-weight:800;flex-shrink:0;
    transition:var(--transition);
}
.chat-pcard-btn:hover{background:var(--primary-hover);}
.chat-pcard-btn:disabled{background:var(--text-muted);cursor:not-allowed;}

/* order card */
.chat-ocard{
    background:var(--bg-elevated);border:1px solid var(--border-light);
    border-radius:var(--radius-md);padding:10px 12px;margin-top:8px;
}
.chat-ocard-top{display:flex;justify-content:space-between;font-size:11.5px;font-weight:800;margin-bottom:4px;}
.chat-ocard-status{
    display:inline-block;font-size:10px;font-weight:800;padding:3px 9px;border-radius:var(--radius-full);
}

/* typing indicator */
.typing-row{display:flex;gap:10px;}
.typing-dots{display:flex;gap:4px;align-items:center;padding:14px 16px;background:var(--bg-surface);border:1px solid var(--border-light);border-radius:var(--radius-lg);border-top-right-radius:4px;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:blink 1.2s infinite ease-in-out;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.25;}40%{opacity:1;}}

/* ---------- SUGGESTIONS ---------- */
.suggest-row{
    display:flex;gap:8px;overflow-x:auto;padding:0 14px 12px;flex-shrink:0;
    scrollbar-width:none;
}
.suggest-row::-webkit-scrollbar{display:none;}
.suggest-chip{
    flex-shrink:0;background:var(--bg-surface);border:1.5px solid var(--border-default);
    color:var(--text-secondary);padding:8px 15px;border-radius:var(--radius-full);
    font-size:12px;font-weight:700;white-space:nowrap;transition:var(--transition);
}
.suggest-chip:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-soft);}

/* ---------- COMPOSER ---------- */
.composer{
    flex-shrink:0;padding:12px 14px calc(14px + env(safe-area-inset-bottom));
    background:var(--bg-surface);border-top:1px solid var(--border-light);
    display:flex;gap:10px;align-items:center;
}
.composer-input{
    flex:1;background:var(--bg-elevated);border:1.5px solid transparent;
    border-radius:var(--radius-full);padding:12px 18px;font-size:13.5px;
    font-family:inherit;color:var(--text-primary);transition:var(--transition);
}
.composer-input:focus{background:var(--bg-surface);border-color:var(--primary);}
.send-btn{
    width:46px;height:46px;border-radius:50%;background:var(--primary);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;
    transition:var(--transition);box-shadow:0 4px 12px rgba(99,102,241,0.35);
}
.send-btn:hover{background:var(--primary-hover);transform:scale(1.05);}
.send-btn:active{transform:scale(0.92);}

@media(min-width:768px){
    body{max-width:480px;margin:0 auto;box-shadow:0 0 40px rgba(0,0,0,0.06);height:100vh;}
}
</style>
</head>
<body>

<header class="ai-header">
    <div class="ai-brand">
        <div class="ai-avatar"><i class="fas fa-robot"></i></div>
        <div>
            <div class="ai-title">دستیار هوشمند SHOP</div>
            <div class="ai-status" id="userStatusLine"><i class="fas fa-circle"></i> در حال بارگذاری...</div>
        </div>
    </div>
    <a href="DigiKala.html" class="back-btn"><i class="fas fa-arrow-right"></i> فروشگاه</a>
</header>

<div class="ai-disclaimer">
    <i class="fas fa-info-circle"></i>
    <span>این دستیار فقط بر اساس اطلاعات واقعی همین فروشگاه (محصولات، سبد، سفارش‌های شما) پاسخ می‌دهد و به هیچ سرویس هوش مصنوعی خارجی وصل نیست.</span>
</div>

<div class="chat-wrap" id="chatWrap"></div>

<div class="suggest-row" id="suggestRow"></div>

<div class="composer">
    <input type="text" class="composer-input" id="chatInput" placeholder="پیام خود را بنویسید..." autocomplete="off">
    <button class="send-btn" id="sendBtn" aria-label="ارسال"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
/* =====================================================================
   MODULE: CONFIG
   ===================================================================== */
const DB = {
    products: 'shopshopProducts',
    users: 'users_database',
    session: 'current_user',
    orders: 'orders_list',
    wishlist: 'shop_wishlist',
    history: 'shop_search_history'
};

const CATEGORY_DATA = {
    "کالای دیجیتال": {
        "موبایل": ["اپل", "سامسونگ", "شیائومی", "گوگل", "ناتینگ"],
        "لپ‌تاپ": ["ایسوس", "لنوو", "اپل", "قطعات کامپیوتر"],
        "هدفون و ساعت هوشمند": ["اپل واچ", "ایرپاد", "ساعت سامسونگ", "اسپیکر"],
        "لوازم جانبی": ["قاب", "گلس", "شارژر"]
    },
    "مد و پوشاک": {
        "مردانه": ["شلوار مردانه", "کفش مردانه", "پافر مردانه", "کلاه"],
        "زنانه": ["شلوار زنانه", "کفش زنانه", "پافر زنانه", "کاپشن زنانه"],
        "بچگانه": ["نوزادی", "پوشاک پسرانه", "پوشاک دخترانه"]
    },
    "خانه و آشپزخانه": {
        "لوازم برقی": ["یخچال", "تلویزیون", "ماشین لباسشویی", "ماشین ظرفشویی"],
        "دکوراسیون": ["فرش", "مبلمان", "لوستر", "مجسمه"],
        "پذیرایی": ["سرویس غذاخوری", "قاشق و چنگال"]
    },
    "آرایشی و بهداشتی": {
        "آرایشی": ["لوازم آرایش چشم", "آرایش لب", "لاک ناخن"],
        "بهداشتی": ["مراقبت پوست", "شامپو و مو", "ضد آفتاب"],
        "عطر و ادکلن": ["مردانه", "زنانه", "اسپری"]
    }
};

const SHIPPING_INFO = [
    { name: 'پست پیشتاز', cost: 35000, time: '۲ تا ۴ روز' },
    { name: 'تیپاکس', cost: 45000, time: '۱ تا ۲ روز' },
    { name: 'ارسال رایگان', cost: 0, time: 'برای سفارش‌های بالای ۱,۰۰۰,۰۰۰ تومان' }
];

const PAYMENT_GATEWAYS = ['زرین‌پال', 'بانک ملت', 'پی‌پینگ'];

const STATUS_LABELS = {
    pending_payment: { text: 'در انتظار پرداخت', color: '#92400e', bg: '#fff3e0' },
    paid: { text: 'پرداخت شده - آماده پردازش', color: '#1976d2', bg: '#e3f2fd' },
    processing: { text: 'در حال پردازش انبار', color: '#ef6c00', bg: '#fff3e0' },
    shipped: { text: 'ارسال شده', color: '#2e7d32', bg: '#e8f5e9' },
    delivered: { text: 'تحویل داده شده', color: '#7b1fa2', bg: '#f3e5f5' },
    failed_payment: { text: 'پرداخت ناموفق', color: '#c62828', bg: '#ffebee' }
};

/* =====================================================================
   MODULE: STORAGE MANAGER (خواندن ایمن از localStorage با بازیابی خطا)
   ===================================================================== */
const StorageManager = {
    safeGet(key, fallback) {
        try {
            const raw = localStorage.getItem(key);
            if (raw === null || raw === undefined) return fallback;
            const parsed = JSON.parse(raw);
            return parsed === null ? fallback : parsed;
        } catch (e) {
            console.warn('[AI][Storage] خطا در خواندن کلید', key, e);
            return fallback;
        }
    },
    safeSet(key, value) {
        try {
            localStorage.setItem(key, JSON.stringify(value));
            return true;
        } catch (e) {
            console.warn('[AI][Storage] خطا در نوشتن کلید', key, e);
            return false;
        }
    }
};

/* =====================================================================
   MODULE: CONTEXT MANAGER (وضعیت فعلی کاربر و سایت)
   ===================================================================== */
const ContextManager = {
    getSessionMobile() {
        try { return localStorage.getItem(DB.session); } catch (e) { return null; }
    },
    getUsers() { return StorageManager.safeGet(DB.users, []); },
    getProducts() { return StorageManager.safeGet(DB.products, []); },
    getAllOrders() { return StorageManager.safeGet(DB.orders, []); },
    getWishlistIds() { return StorageManager.safeGet(DB.wishlist, []); },

    isLoggedIn() { return !!this.getSessionMobile(); },

    getCurrentUser() {
        const mobile = this.getSessionMobile();
        if (!mobile) return null;
        const users = this.getUsers();
        const found = users.find(u => u.mobile === mobile);
        if (!found) return null;
        // امنیت: رمز عبور هرگز نباید در context دستیار ظاهر شود
        const { password, ...safeUser } = found;
        return safeUser;
    },

    getCartRaw() {
        const user = this.getCurrentUser();
        return (user && Array.isArray(user.cart)) ? user.cart : [];
    },

    getCartDetailed() {
        const cart = this.getCartRaw();
        const products = this.getProducts();
        return cart.map(item => {
            const p = products.find(pr => pr.id == item.id);
            if (!p) return null;
            const unitPrice = p.price - (p.price * (p.discount || 0) / 100);
            return { ...item, product: p, unitPrice, lineTotal: unitPrice * item.qty };
        }).filter(Boolean);
    },

    getMyOrders() {
        const mobile = this.getSessionMobile();
        if (!mobile) return [];
        return this.getAllOrders()
            .filter(o => o.userId === mobile)
            .sort((a, b) => (b.id || 0) - (a.id || 0));
    }
};

/* =====================================================================
   MODULE: PRODUCT ENGINE (جستجو و امتیازدهی — هم‌سو با منطق DigiKala.html)
   ===================================================================== */
function norm(s) {
    return (s || '').replace(/[يى]/g, 'ی').replace(/[كک]/g, 'ک')
        .replace(/[\u064B-\u065F]/g, '').replace(/\s+/g, ' ').trim().toLowerCase();
}
function levenshtein(a, b) {
    const m = [], la = a.length, lb = b.length;
    for (let i = 0; i <= lb; i++) m[i] = [i];
    for (let j = 0; j <= la; j++) m[0][j] = j;
    for (let i = 1; i <= lb; i++)
        for (let j = 1; j <= la; j++)
            m[i][j] = b[i - 1] === a[j - 1] ? m[i - 1][j - 1] : Math.min(m[i - 1][j - 1] + 1, m[i][j - 1] + 1, m[i - 1][j] + 1);
    return m[lb][la];
}
function fuzzyMatch(q, text) {
    const qn = norm(q), tn = norm(text);
    if (!qn) return false;
    if (tn.includes(qn)) return true;
    return tn.split(' ').some(w => w.length >= 3 && levenshtein(qn, w) <= Math.floor(qn.length / 4));
}

const ProductEngine = {
    search(query, limit) {
        limit = limit || 4;
        const products = ContextManager.getProducts();
        const qn = norm(query);
        if (!qn) return [];
        const scored = products.map(p => {
            const name = norm(p.name || '');
            const cat = norm(p.breadcrumb || p.category || '');
            let score = 0;
            if (name === qn) score += 200;
            else if (name.startsWith(qn)) score += 150;
            else if (name.includes(qn)) score += 100;
            else if (cat.includes(qn)) score += 60;
            else if (fuzzyMatch(query, p.name)) score += 30;
            if (!score) return null;
            if (p.stock > 0) score += 30; else score -= 60;
            score += (p.rating || 0) * 3;
            return { p, score };
        }).filter(Boolean).sort((a, b) => b.score - a.score);
        return scored.slice(0, limit).map(s => s.p);
    },

    recommend(limit) {
        limit = limit || 4;
        const products = ContextManager.getProducts();
        return products
            .filter(p => p.stock > 0)
            .sort((a, b) => (b.discount || 0) - (a.discount || 0) || (b.rating || 0) - (a.rating || 0))
            .slice(0, limit);
    },

    findById(id) {
        return ContextManager.getProducts().find(p => p.id == id) || null;
    }
};

/* =====================================================================
   MODULE: ACTION LAYER (افزودن به سبد از داخل چت — هم‌سو با منطق موجود سایت)
   ===================================================================== */
const ActionLayer = {
    addToCart(productId) {
        const mobile = ContextManager.getSessionMobile();
        if (!mobile) return { ok: false, reason: 'guest' };

        const product = ProductEngine.findById(productId);
        if (!product) return { ok: false, reason: 'not_found' };
        if (!product.stock || product.stock <= 0) return { ok: false, reason: 'out_of_stock' };

        const users = ContextManager.getUsers();
        const idx = users.findIndex(u => u.mobile === mobile);
        if (idx === -1) return { ok: false, reason: 'user_missing' };

        if (!Array.isArray(users[idx].cart)) users[idx].cart = [];
        const defaultColor = (product.colors && product.colors[0] && product.colors[0].name) || 'مشکی';
        const existing = users[idx].cart.find(x => x.id == productId);

        if (existing) {
            if (existing.qty + 1 > product.stock) return { ok: false, reason: 'stock_limit' };
            existing.qty += 1;
        } else {
            users[idx].cart.push({ id: product.id, qty: 1, color: defaultColor });
        }

        const saved = StorageManager.safeSet(DB.users, users);
        if (!saved) return { ok: false, reason: 'storage_error' };

        updateCartBadgeEverywhere(users[idx].cart);
        return { ok: true };
    }
};

function updateCartBadgeEverywhere(cart) {
    // فقط برای هماهنگی وضعیت داخل همین صفحه؛ صفحات دیگر با لود مجدد خودشان همگام می‌شوند
    const count = cart.reduce((a, i) => a + i.qty, 0);
    document.title = count > 0 ? `(${count}) دستیار هوشمند SHOP` : 'دستیار هوشمند SHOP';
}

/* =====================================================================
   MODULE: INTENT DETECTION ENGINE
   ===================================================================== */
const INTENT_RULES = [
    { name: 'greeting', keywords: ['سلام', 'درود', 'وقت بخیر', 'hi', 'hello'] },
    { name: 'help', keywords: ['کمک', 'راهنما', 'چیکار میتونی', 'چه کاری بلدی', 'چه کارهایی'] },
    { name: 'cart_status', keywords: ['سبد خرید', 'سبدم', 'تو سبدم', 'سبد من', 'چی خریدم'] },
    { name: 'order_status', keywords: ['سفارشاتم', 'سفارش هام', 'پیگیری سفارش', 'وضعیت سفارش', 'سفارشم'] },
    { name: 'wishlist_status', keywords: ['علاقه مندی', 'لیست دلخواه', 'ویشلیست', 'مورد علاقه'] },
    { name: 'shipping_info', keywords: ['هزینه ارسال', 'روش ارسال', 'ارسال چقدر', 'تیپاکس', 'پست پیشتاز'] },
    { name: 'payment_info', keywords: ['روش پرداخت', 'درگاه پرداخت', 'چطور پرداخت'] },
    { name: 'category_info', keywords: ['دسته بندی', 'دسته‌بندی', 'چه محصولاتی دارید', 'چی دارید'] },
    { name: 'login_help', keywords: ['چطور ثبت نام', 'چطور وارد شوم', 'ورود به حساب', 'رمز عبور'] },
    { name: 'checkout_help', keywords: ['چطور خرید کنم', 'تسویه حساب', 'تکمیل خرید', 'نحوه خرید'] },
    { name: 'recommend', keywords: ['پیشنهاد بده', 'معرفی کن', 'چی بخرم', 'پیشنهاد میدی'] },
    { name: 'search_product', keywords: ['دنبال', 'میخوام', 'می خواهم', 'جستجو', 'پیدا کن', 'دارید'] }
];

function detectIntent(rawText) {
    const t = norm(rawText);
    if (!t) return { name: 'empty' };

    for (const rule of INTENT_RULES) {
        for (const kw of rule.keywords) {
            if (t.includes(norm(kw))) {
                return { name: rule.name, raw: rawText };
            }
        }
    }
    // اگر هیچ الگویی مچ نشد ولی حداقل ۲ کاراکتر معنادار دارد، فرض می‌کنیم قصد جستجوی محصول دارد
    if (t.length >= 2) return { name: 'search_product', raw: rawText, implicit: true };
    return { name: 'unknown', raw: rawText };
}

function extractSearchQuery(text) {
    let t = norm(text);
    const stripWords = ['دنبال', 'میخوام', 'می خواهم', 'جستجو', 'پیدا کن', 'دارید', 'یک', 'یه', 'برای من'];
    stripWords.forEach(w => { t = t.replace(norm(w), ''); });
    return t.trim();
}

/* =====================================================================
   MODULE: RESPONSE GENERATOR (تولید پاسخ بر اساس Intent)
   ===================================================================== */
function escapeHtml(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function fmtPrice(n) { return Math.round(n).toLocaleString('en-US'); }

function renderProductCard(p) {
    const finalPrice = p.price - (p.price * (p.discount || 0) / 100);
    const oldPriceHtml = p.discount > 0 ? `<span class="chat-pcard-old">${fmtPrice(p.price)}</span>` : '';
    const stockText = p.stock > 0 ? `موجودی: ${p.stock} عدد` : 'ناموجود';
    const disabled = p.stock > 0 ? '' : 'disabled';
    return `
        <div class="chat-pcard">
            <img src="${p.image}" onerror="this.src='https://via.placeholder.com/52?text=%20'" alt="${escapeHtml(p.name)}">
            <div class="chat-pcard-info">
                <div class="chat-pcard-name">${escapeHtml(p.name)}</div>
                <div class="chat-pcard-price">${fmtPrice(finalPrice)} تومان ${oldPriceHtml}</div>
                <div class="chat-pcard-stock">${stockText}</div>
            </div>
            <button class="chat-pcard-btn" ${disabled} onclick="handleAddToCartClick(${p.id}, this)">افزودن</button>
        </div>`;
}

function renderOrderCard(o) {
    const st = STATUS_LABELS[o.status] || { text: o.status || 'نامشخص', color: '#555', bg: '#eee' };
    const dateStr = o.createdAt ? new Date(o.createdAt).toLocaleDateString('fa-IR') : (o.datePersian || '—');
    return `
        <div class="chat-ocard">
            <div class="chat-ocard-top">
                <span>سفارش #${o.id}</span>
                <span style="color:var(--text-muted);font-weight:600;">${dateStr}</span>
            </div>
            <span class="chat-ocard-status" style="color:${st.color};background:${st.bg};">${st.text}</span>
            <div style="margin-top:6px;font-size:11.5px;color:var(--text-secondary);">
                مبلغ کل: <strong>${fmtPrice(o.totalAmount || 0)} تومان</strong>
            </div>
        </div>`;
}

function actionButton(label, jsCall, icon) {
    return `<button class="msg-action-btn" onclick="${jsCall}">${icon ? `<i class="fas ${icon}"></i>` : ''}${escapeHtml(label)}</button>`;
}

const ResponseGenerator = {
    greeting() {
        const user = ContextManager.getCurrentUser();
        const name = user && user.name ? user.name.split(' ')[0] : null;
        const hello = name ? `سلام ${name} عزیز 👋` : 'سلام! خوش اومدی 👋';

        };
    },

    help() {
        return {
            html: `<p>این کارها از دستم برمیاد:</p>
                <p>🛒 وضعیت سبد خرید و مبلغ کل</p>
                <p>📦 پیگیری سفارش‌های ثبت‌شده</p>
                <p>🔍 جستجو و پیشنهاد محصول</p>
                <p>🚚 اطلاعات هزینه و روش ارسال</p>
                <p>💳 راهنمای روش‌های پرداخت</p>
                <p>👤 راهنمای ورود و ثبت‌نام</p>
                <p>کافیه بپرسی!</p>`
        };
    },

    cart_status() {
        if (!ContextManager.isLoggedIn()) {
            return {
                html: `<p>برای دیدن سبد خریدت باید اول وارد حسابت بشی.</p>`,
                actions: [actionButton('ورود به حساب', "goTo('login.html')", 'fa-sign-in-alt')]
            };
        }
        const items = ContextManager.getCartDetailed();
        if (items.length === 0) {
            return {
                html: `<p>سبد خریدت فعلاً خالیه. می‌خوای چند تا پیشنهاد ببینی؟</p>`,
                actions: [actionButton('پیشنهاد بده', "sendQuick('پیشنهاد بده')", 'fa-lightbulb')]
            };
        }
        const total = items.reduce((a, i) => a + i.lineTotal, 0);
        const count = items.reduce((a, i) => a + i.qty, 0);
        let html = `<p>سبد خریدت الان <strong>${count}</strong> کالا داره:</p>`;
        items.slice(0, 5).forEach(i => { html += renderProductCard(i.product); });
        html += `<p style="margin-top:8px;">جمع کل: <strong>${fmtPrice(total)} تومان</strong></p>`;
        return { html, actions: [actionButton('رفتن به سبد خرید', "goTo('sabad.html')", 'fa-shopping-cart')] };
    },

    order_status() {
        if (!ContextManager.isLoggedIn()) {
            return {
                html: `<p>برای دیدن سفارش‌هات باید وارد حسابت بشی.</p>`,
                actions: [actionButton('ورود به حساب', "goTo('login.html')", 'fa-sign-in-alt')]
            };
        }
        const orders = ContextManager.getMyOrders();
        if (orders.length === 0) {
            return { html: `<p>هنوز هیچ سفارشی ثبت نکردی.</p>` };
        }
        let html = `<p>آخرین سفارش‌هات:</p>`;
        orders.slice(0, 3).forEach(o => { html += renderOrderCard(o); });
        return { html, actions: [actionButton('مشاهده همه در پروفایل', "goTo('profile.html')", 'fa-user')] };
    },

    wishlist_status() {
        const ids = ContextManager.getWishlistIds();
        if (ids.length === 0) {
            return { html: `<p>لیست علاقه‌مندی‌ات فعلاً خالیه.</p>` };
        }
        const products = ContextManager.getProducts().filter(p => ids.includes(p.id));
        let html = `<p>این‌ها تو لیست علاقه‌مندی‌هاته:</p>`;
        products.slice(0, 4).forEach(p => { html += renderProductCard(p); });
        return { html, actions: [actionButton('مشاهده کامل در پروفایل', "goTo('profile.html')", 'fa-heart')] };
    },

    shipping_info() {
        let html = `<p>روش‌های ارسال فعلی فروشگاه:</p>`;
        SHIPPING_INFO.forEach(s => {
            const costText = s.cost === 0 ? 'رایگان' : `${fmtPrice(s.cost)} تومان`;
            html += `<p>📦 <strong>${s.name}</strong> — ${costText} (${s.time})</p>`;
        });
        return { html };
    },

    payment_info() {
        return {
            html: `<p>در مرحله‌ی تسویه حساب می‌تونی از این درگاه‌ها انتخاب کنی:</p>
                <p>${PAYMENT_GATEWAYS.map(g => '💳 ' + g).join('<br>')}</p>
                <p>پرداخت از داخل صفحه‌ی تسویه‌حساب انجام می‌شه.</p>`
        };
    },

    category_info() {
        let html = `<p>دسته‌بندی‌های اصلی فروشگاه:</p>`;
        Object.keys(CATEGORY_DATA).forEach(cat => { html += `<p>🗂 ${cat}</p>`; });
        return { html, actions: [actionButton('مشاهده همه محصولات', "goTo('DigiKala.html')", 'fa-store')] };
    },

    login_help() {
        return {
            html: `<p>ورود خیلی ساده‌ست:</p>
                <p>۱️⃣ شماره موبایلت رو وارد کن</p>
                <p>۲️⃣ اگه قبلاً ثبت‌نام کرده باشی، رمز عبورت رو وارد می‌کنی</p>
                <p>۳️⃣ اگه کاربر جدیدی، یک نام و رمز عبور جدید انتخاب می‌کنی</p>
                <p>⚠️ من نمی‌تونم رمز عبورت رو اینجا داخل چت بگیرم؛ برای امنیت باید مستقیم داخل صفحه‌ی ورود وارد کنی.</p>`,
            actions: [actionButton('رفتن به صفحه ورود', "goTo('login.html')", 'fa-sign-in-alt')]
        };
    },

    checkout_help() {
        if (!ContextManager.isLoggedIn()) {
            return {
                html: `<p>برای خرید اول باید وارد حسابت بشی، بعد از سبد خرید وارد تسویه حساب می‌شی.</p>`,
                actions: [actionButton('ورود به حساب', "goTo('login.html')", 'fa-sign-in-alt')]
            };
        }
        const items = ContextManager.getCartDetailed();
        if (items.length === 0) {
            return {
                html: `<p>سبدت خالیه، اول باید چیزی به سبد اضافه کنی.</p>`,
                actions: [actionButton('پیشنهاد بده', "sendQuick('پیشنهاد بده')", 'fa-lightbulb')]
            };
        }
        return {
            html: `<p>مراحل تکمیل خرید:</p>
                <p>۱️⃣ از سبد خرید وارد تسویه‌حساب شو</p>
                <p>۲️⃣ آدرس و روش ارسال رو انتخاب کن</p>
                <p>۳️⃣ درگاه پرداخت مورد نظرت رو انتخاب کن و پرداخت رو تکمیل کن</p>`,
            actions: [actionButton('رفتن به سبد خرید', "goTo('sabad.html')", 'fa-shopping-cart')]
        };
    },

    recommend() {
        const items = ProductEngine.recommend(4);
        if (items.length === 0) {
            return { html: `<p>در حال حاضر محصولی برای پیشنهاد موجود نیست.</p>` };
        }
        let html = `<p>این‌ها رو پیشنهاد می‌کنم:</p>`;
        items.forEach(p => { html += renderProductCard(p); });
        return { html };
    },

    search_product(intent) {
        const q = extractSearchQuery(intent.raw);
        if (!q || q.length < 2) {
            return { html: `<p>چی می‌خوای پیدا کنی؟ یه کم دقیق‌تر بگو 🙂</p>` };
        }
        const results = ProductEngine.search(q, 4);
        if (results.length === 0) {
            return {
                html: `<p>چیزی برای «${escapeHtml(q)}» پیدا نکردم. می‌خوای چند تا پیشنهاد کلی ببینی؟</p>`,
                actions: [actionButton('پیشنهاد بده', "sendQuick('پیشنهاد بده')", 'fa-lightbulb')]
            };
        }
        let html = `<p>این نتایج رو برای «${escapeHtml(q)}» پیدا کردم:</p>`;
        results.forEach(p => { html += renderProductCard(p); });
        return { html, actions: [actionButton('دیدن همه نتایج در فروشگاه', "goTo('DigiKala.html')", 'fa-search')] };
    },

    unknown() {
        return {
            html: `<p>متوجه نشدم دقیقاً چی می‌خوای. می‌تونی درباره‌ی سبد خرید، سفارش‌ها، پیشنهاد محصول یا نحوه‌ی خرید ازم بپرسی.</p>`
        };
    },

    empty() {
        return { html: `<p>پیامت خالی بود، دوباره بنویس 🙂</p>` };
    }
};

/* =====================================================================
   MODULE: UI CONTROLLER
   ===================================================================== */
const chatWrap = document.getElementById('chatWrap');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const suggestRow = document.getElementById('suggestRow');

function scrollToBottom() {
    chatWrap.scrollTop = chatWrap.scrollHeight;
}

function appendMessage(role, innerHtml) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    const avatarIcon = role === 'bot' ? 'fa-robot' : 'fa-user';
    row.innerHTML = `
        <div class="msg-avatar"><i class="fas ${avatarIcon}"></i></div>
        <div class="msg-bubble">${innerHtml}</div>`;
    chatWrap.appendChild(row);
    scrollToBottom();
}

function appendUserText(text) {
    appendMessage('user', `<p>${escapeHtml(text)}</p>`);
}

function appendBotResponse(resp) {
    let html = resp.html || '';
    if (resp.actions && resp.actions.length) {
        html += `<div class="msg-actions">${resp.actions.join('')}</div>`;
    }
    appendMessage('bot', html);
}

function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot typing-row';
    row.id = 'typingRow';
    row.innerHTML = `
        <div class="msg-avatar"><i class="fas fa-robot"></i></div>
        <div class="typing-dots"><span></span><span></span><span></span></div>`;
    chatWrap.appendChild(row);
    scrollToBottom();
}
function hideTyping() {
    const el = document.getElementById('typingRow');
    if (el) el.remove();
}

/* =====================================================================
   MODULE: ERROR RECOVERY (اجرای امن هر پردازش پیام)
   ===================================================================== */
function processMessage(text) {
    try {
        const intent = detectIntent(text);
        const handler = ResponseGenerator[intent.name] || ResponseGenerator.unknown;
        return handler(intent);
    } catch (err) {
        console.error('[AI] خطای پردازش پیام:', err);
        return { html: `<p>یه مشکل کوچیک پیش اومد، دوباره امتحان کن 🙏</p>` };
    }
}

function handleSend() {
    const text = chatInput.value.trim();
    if (!text) return;
    appendUserText(text);
    chatInput.value = '';
    showTyping();
    setTimeout(() => {
        hideTyping();
        const resp = processMessage(text);
        appendBotResponse(resp);
    }, 450 + Math.random() * 350);
}

function sendQuick(text) {
    chatInput.value = text;
    handleSend();
}

function goTo(page) {
    window.location.href = page;
}

function handleAddToCartClick(productId, btnEl) {
    const result = ActionLayer.addToCart(productId);
    if (result.ok) {
        btnEl.innerText = 'اضافه شد ✓';
        btnEl.disabled = true;
        showTyping();
        setTimeout(() => {
            hideTyping();
            appendBotResponse({
                html: `<p>به سبد خریدت اضافه شد ✅</p>`,
                actions: [actionButton('رفتن به سبد خرید', "goTo('sabad.html')", 'fa-shopping-cart')]
            });
        }, 350);
        return;
    }
    const reasons = {
        guest: 'برای افزودن به سبد باید اول وارد حسابت بشی.',
        not_found: 'این محصول دیگه در دسترس نیست.',
        out_of_stock: 'متأسفانه این کالا ناموجوده.',
        stock_limit: 'موجودی انبار برای این تعداد کافی نیست.',
        user_missing: 'مشکلی در حساب کاربری پیش اومد.',
        storage_error: 'مشکلی در ذخیره‌سازی پیش اومد.'
    };
    showTyping();
    setTimeout(() => {
        hideTyping();
        const actions = result.reason === 'guest' ? [actionButton('ورود به حساب', "goTo('login.html')", 'fa-sign-in-alt')] : [];
        appendBotResponse({ html: `<p>⚠️ ${reasons[result.reason] || 'افزودن به سبد ممکن نشد.'}</p>`, actions });
    }, 300);
}

/* =====================================================================
   INIT
   ===================================================================== */
function renderStatusLine() {
    const el = document.getElementById('userStatusLine');
    const user = ContextManager.getCurrentUser();
    if (user) {
        el.innerHTML = `<i class="fas fa-circle"></i> وارد شده به‌عنوان ${escapeHtml(user.name || user.mobile)}`;
    } else {
        el.innerHTML = `<i class="fas fa-circle" style="color:var(--text-muted);"></i> مهمان — وارد نشده‌اید`;
    }
}

function renderSuggestions() {
    const chips = [
        'وضعیت سبد خریدم',
        'سفارش‌های من',
        'پیشنهاد بده',
        'هزینه ارسال چقدره؟',
        'چطور خرید کنم؟'
    ];
    suggestRow.innerHTML = chips.map(c => `<button class="suggest-chip" onclick="sendQuick('${c}')">${c}</button>`).join('');
}

document.addEventListener('DOMContentLoaded', () => {
    renderStatusLine();
    renderSuggestions();
    const initial = ResponseGenerator.greeting();
    appendBotResponse(initial);
});

sendBtn.addEventListener('click', handleSend);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });
</script>
