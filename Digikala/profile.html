<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> پروفایل کاربری </title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="images/f0909d6eae7ee548665693cfbe823b078cf70ede_1774984328.png">
<style>
    :root {
        --primary: #736be8;
        --primary-hover: #6057d8;
        --success: #00c853; /* سبز چمنی */
        --bg-body: #f0f2f5;
        --card-bg: rgba(255, 255, 255, 0.98);
        --text-main: #212121;
        --text-light: #757575;
        --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
        --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
        --radius: 16px;
    }

    body {
        background-color: var(--bg-body);
        font-family: 'Vazirmatn', sans-serif;
        margin: 0;
        padding-bottom: 40px;
        color: var(--text-main);
        overflow-x: hidden;
    }

    /* --- Loading Screen --- */
    .loading-screen {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: var(--bg-body);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.5s ease;
    }
    .loader-dots {
        display: flex;
        gap: 10px;
    }
    .dot {
        width: 15px;
        height: 15px;
        background: var(--primary);
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out both;
    }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
    }

    /* --- Header & Nav --- */
    .profile-nav {
        background: var(--card-bg);
        padding: 15px 5%;
        box-shadow: var(--shadow-sm);
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
    }
    .logo { font-size: 22px; font-weight: 800; color: var(--primary); text-decoration: none; }
    .back-home { text-decoration: none; color: var(--text-light); font-weight: 600; display: flex; align-items: center; gap: 8px; }

    /* --- Layout --- */
    .container {
        display: flex;
        max-width: 1200px;
        margin: 30px auto;
        gap: 25px;
        padding: 0 20px;
    }

    /* --- Sidebar --- */
    .sidebar {
        width: 280px;
        background: var(--card-bg);
        border-radius: var(--radius);
        padding: 25px;
        box-shadow: var(--shadow-sm);
        height: fit-content;
        position: sticky;
        top: 90px;
    }
    .user-info-side { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
    .avatar { 
        width: 80px; height: 80px; background: #ffebee; color: var(--primary); 
        border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 32px; 
    }
    .menu-item {
        padding: 12px 15px; cursor: pointer; border-radius: 10px; margin-bottom: 8px;
        transition: 0.3s; color: var(--text-light); display: flex; align-items: center; gap: 10px;
    }
    .menu-item:hover, .menu-item.active { background: #fff1f2; color: var(--primary); font-weight: bold; }
    
    /* --- Main Content --- */
    .main-content { flex: 1; }
    .card {
        background: var(--card-bg);
        padding: 30px;
        border-radius: var(--radius);
        box-shadow: var(--shadow-sm);
        margin-bottom: 25px;
        animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .section-title { font-size: 18px; font-weight: 800; margin: 0 0 20px; display: flex; align-items: center; gap: 10px; }
    .section-title::before { content: ''; width: 5px; height: 20px; background: var(--primary); border-radius: 4px; }

    /* --- Forms --- */
    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
    .info-item label { display: block; font-size: 12px; color: var(--text-light); margin-bottom: 5px; }
    .info-item span { font-weight: bold; display: block; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
    input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; display: none; margin-top: 5px; }
    
    .btn-action { padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
    .btn-edit { background: #e3f2fd; color: #1976d2; }
    .btn-save { background: #4caf50; color: white; display: none; float: left; }

    /* --- Wallet Stats --- */
    .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .stat-box { background: #f8f9fa; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #eee; }
    .stat-value { font-size: 24px; font-weight: 900; margin-top: 5px; }
    .text-green { color: #4caf50; }
    .text-orange { color: #ff9800; }

    /* --- Orders Sub-Tabs --- */
    .order-tabs { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .order-tab-btn {
        background: none; border: none; padding: 8px 16px; cursor: pointer; font-weight: bold; color: var(--text-light); border-radius: 8px;
    }
    .order-tab-btn.active { background: var(--primary); color: white; }

    /* --- Order Card Design --- */
    .order-card {
        border: 1px solid #eee; border-radius: 16px; padding: 25px; margin-bottom: 25px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    .order-header { display: flex; justify-content: space-between; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px dashed #eee; }
    .order-id { font-weight: 800; color: var(--primary); font-size: 16px; }
    .order-date { font-size: 12px; color: var(--text-light); }

    /* ==========================================
       استایل جدید نوار پیشرفت سفارشات (اصلاح شده برای RTL)
       ========================================== */
    .order-progress-wrapper {
        margin-top: 25px;
        padding: 10px 5px;
        direction: rtl; /* مهم: جهت راست به چپ برای نمایش صحیح مراحل */
    }

    .steps-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
        width: 100%;
    }

    /* استایل دایره ها */
    .step-circle-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 2;
        width: 60px; /* فضای استاندارد هر دایره */
    }

    .circle-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: #e0e0e2; /* خاکستری پیش فرض */
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        transition: all 0.4s ease;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        position: relative;
    }

    /* متن زیر دایره */
    .step-label {
        margin-top: 10px;
        font-size: 12px;
        font-weight: bold;
        color: #757575;
        text-align: center;
        width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    /* حالت تکمیل شده (سبز چمنی با تیک) */
    .step-circle-box.completed .circle-icon {
        background-color: var(--success);
        color: #fff;
    }
    
    .step-circle-box.completed .step-label {
        color: var(--success);
    }

    /* حالت فعال (مرحله جاری) - دایره سفید با حاشیه سبز */
    .step-circle-box.active .circle-icon {
        background-color: #fff;
        border: 3px solid var(--success);
        color: transparent; /* بدون آیکون */
    }
    
    .step-circle-box.active .step-label {
        color: #212121;
    }

    /* لاین های بین دایره ها */
    .track-line {
        flex-grow: 1;
        height: 4px;
        background-color: #e0e0e2; /* خاکستری پس زمینه خط */
        margin: 0 5px; /* فاصله کوچک از دایره ها */
        border-radius: 2px;
        position: relative;
        top: -18px; /* تنظیم ارتفاع خط نسبت به مرکز دایره */
        z-index: 1;
    }

    /* پر شدن لاین (سبز چمنی) */
    .track-line.filled::after {
        content: '';
        position: absolute;
        top: 0;
        right: 0; /* پر شدن از سمت راست شروع می‌شود */
        height: 100%;
        width: 0%;
        background-color: var(--success);
        border-radius: 2px;
        transition: width 0.5s ease-in-out;
    }

    /* انیمیشن پر شدن لاین */
    .track-line.filling-1::after { width: 10%; } /* فقط ۱۰ درصد */
    .track-line.filling-2::after { width: 10%; }
    .track-line.filling-3::after { width: 10%; }
    
    /* حالت نهایی: تمام خطوط کاملاً سبز */
    .track-line.final-filled::after {
        width: 100% !important;
    }

    /* رسپانسیو برای موبایل */
    @media (max-width: 600px) {
        .step-circle-box { width: 45px; }
        .circle-icon { width: 32px; height: 32px; font-size: 14px; }
        .step-label { font-size: 10px; }
        .track-line { margin: 0 2px; top: -14px; }
    }

    /* --- استایل مدرن لیست علاقه‌مندی‌ها (Wishlist) --- */
    .wishlist-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
    }

    .wishlist-card {
        background: #fff;
        border: 1px solid #eee;
        border-radius: var(--radius);
        padding: 15px;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .wishlist-card:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-md);
        border-color: #ddd;
    }

    .wishlist-img-wrapper {
        position: relative;
        width: 100%;
        height: 180px;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fafafa;
        border-radius: 12px;
        overflow: hidden;
    }

    .wishlist-img-wrapper img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        transition: transform 0.3s ease;
    }

    .wishlist-card:hover .wishlist-img-wrapper img {
        transform: scale(1.05);
    }

    .wishlist-actions-overlay {
        position: absolute;
        top: 10px;
        left: 10px;
        display: flex;
        gap: 8px;
        opacity: 0;
        transform: translateX(-10px);
        transition: all 0.3s ease;
    }

    .wishlist-card:hover .wishlist-actions-overlay {
        opacity: 1;
        transform: translateX(0);
    }

    .action-btn-small {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 14px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        transition: 0.2s;
    }

    .btn-add-cart-mini {
        background: var(--primary);
        color: white;
    }
    .btn-add-cart-mini:hover { background: #d32f2f; }

    .btn-remove-mini {
        background: #fff;
        color: #ff5252;
        border: 1px solid #ffebee;
    }
    .btn-remove-mini:hover { background: #ffebee; }

    .wishlist-info {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    .wishlist-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 8px;
        line-height: 1.5;
        height: 42px; /* محدود کردن ارتفاع متن */
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
    }

    .wishlist-price-row {
        margin-top: auto;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
    }

    .old-price {
        font-size: 12px;
        color: #9e9e9e;
        text-decoration: line-through;
    }

    .final-price {
        font-size: 16px;
        font-weight: 800;
        color: var(--text-main);
    }

    .final-price small {
        font-size: 11px;
        font-weight: 400;
        color: var(--text-light);
        margin-right: 3px;
    }

    /* رسپانسیو موبایل برای لیست علاقه‌مندی */
    @media (max-width: 600px) {
        .wishlist-grid {
            grid-template-columns: repeat(2, 1fr); /* دو ستون در موبایل */
            gap: 10px;
        }
        .wishlist-img-wrapper { height: 140px; }
        .wishlist-actions-overlay { opacity: 1; transform: translateX(0); } /* همیشه دکمه‌ها دیده شوند */
        .wishlist-title { font-size: 12px; height: 36px; }
        .final-price { font-size: 14px; }
    }

    /* --- کلاس مخفی کردن کادرها --- */
    .hidden {
        display: none !important;
    }

</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
    <div class="loader-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
</div>

<nav class="profile-nav">
    <a href="DigiKala.html" class="logo">SHOP</a>
    <a href="DigiKala.html" class="back-home"><i class="fas fa-arrow-right"></i> بازگشت به فروشگاه</a>
</nav>

<div class="container">
    <aside class="sidebar">
        <div class="user-info-side">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <h3 id="side-name" style="margin: 10px 0 5px;"> کاربر مهمان</h3>
            <p id="side-mobile" style="font-size: 13px; color: var(--text-light);"></p>
        </div>
        
        <div class="menu-item active" onclick="showSection('personal', this)">
            <i class="fas fa-id-card"></i> اطلاعات حساب
        </div>
        <div class="menu-item" onclick="showSection('orders', this)">
            <i class="fas fa-shopping-bag"></i> سفارشات من
        </div>
        <div class="menu-item" onclick="showSection('favs', this)">
            <i class="fas fa-heart"></i> علاقه‌مندی‌ها
        </div>
        <div class="menu-item" onclick="showSection('wallet', this)">
            <i class="fas fa-wallet"></i> کیف پول
        </div>

        <button onclick="logout()" style="width:100%; border:none; background:#fff1f2; color:var(--primary); padding:12px; border-radius:10px; cursor:pointer; font-weight:bold; margin-top:20px;">
            <i class="fas fa-sign-out-alt"></i> خروج از حساب
        </button>
    </aside>

    <main class="main-content">
        <!-- Personal Info -->
        <div id="sec-personal" class="card">
            <div class="section-title"> اطلاعات شخصی</div>
            <div style="margin-bottom: 20px;">
                <button class="btn-action btn-edit" id="edit-btn" onclick="toggleEdit(true)">
                    <i class="fas fa-pen"></i> ویرایش
                </button>
                <button class="btn-action btn-save" id="save-btn" onclick="saveUserData()">
                    <i class="fas fa-check"></i> ذخیره تغییرات
                </button>
            </div>
            
            <div class="info-grid">
                <div class="info-item">
                    <label> نام و نام خانوادگی</label>
                    <span id="v-name"></span>
                    <input type="text" id="i-name">
                </div>
                <div class="info-item">
                    <label> کد ملی</label>
                    <span id="v-melli"></span>
                    <input type="text" id="i-melli">
                </div>
                <div class="info-item">
                    <label> شماره موبایل</label>
                    <span id="v-mobile"></span>
                </div>
                <div class="info-item">
                    <label> ایمیل</label>
                    <span id="v-email"></span>
                    <input type="email" id="i-email">
                </div>
                <div class="info-item" style="grid-column: span 2;">
                    <label> آدرس ارسال</label>
                    <span id="v-address"></span>
                    <input type="text" id="i-address">
                </div>
                <div class="info-item">
                    <label> کد پستی</label>
                    <span id="v-post"></span>
                    <input type="text" id="i-post">
                </div>
                <div class="info-item">
                    <label> تاریخ عضویت</label>
                    <span id="v-date"></span>
                </div>
            </div>
        </div>

        <!-- Wallet -->
        <div id="sec-wallet" class="card hidden">
            <div class="section-title"> کیف پول و باشگاه مشتریان</div>
            <div class="stat-grid">
                <div class="stat-box">
                    <div style="font-size:12px; color:#888;"> موجودی کیف پول</div>
                    <div class="stat-value text-green"><span id="v-wallet">0</span> <small> تومان</small></div>
                </div>
                <div class="stat-box">
                    <div style="font-size:12px; color:#888;"> امتیاز باشگاه</div>
                    <div class="stat-value text-orange"><span id="v-points">0</span> <small> امتیاز</small></div>
                </div>
            </div>
        </div>

        <!-- Orders -->
        <div id="sec-orders" class="card hidden">
            <div class="section-title"> سفارشات من</div>
            <div class="order-tabs">
                <button class="order-tab-btn active" onclick="filterOrders('current')"> سفارشات جاری</button>
                <button class="order-tab-btn" onclick="filterOrders('delivered')"> تحویل داده شده</button>
            </div>
            <div id="orders-list">
                <div style="text-align:center; padding:40px; color:#aaa;"> هنوز سفارشی ثبت نکرده‌اید.</div>
            </div>
        </div>

        <!-- Favorites -->
        <div id="sec-favs" class="card hidden">
            <div class="section-title"> لیست علاقه‌مندی‌ها</div>
            <!-- ساختار جدید برای گرید محصولات -->
            <div id="favs-list" class="wishlist-grid">
                <div style="text-align:center; padding:40px; color:#aaa; grid-column: 1/-1;"> لیست شما خالی است.</div>
            </div>
        </div>
    </main>
</div>
<script>
    // --- Keys ---
    const USERS_KEY = 'users_database';
    const CURRENT_USER_KEY = 'current_user';
    const PRODUCTS_KEY = 'shopshopProducts'; 
    const WISHLIST_KEY = 'shop_wishlist';
    const ORDERS_KEY = 'orders_list'; 

    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('loadingScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loadingScreen').style.display = 'none';
            }, 500);
        }, 800);
    });

    document.addEventListener('DOMContentLoaded', loadUserData);

    function loadUserData() {
        const currentUserMobile = localStorage.getItem(CURRENT_USER_KEY);
        
        if (!currentUserMobile) {
            console.log("توکن ورود یافت نشد.");
            window.location.href = 'login.html';
            return;
        }

        let users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];
        let userIndex = users.findIndex(u => u.mobile === currentUserMobile);
        let user = users[userIndex];

        if (!user) {
            console.warn("کاربر لاگین کرده اما در دیتابیس نیست. ایجاد رکورد...");
            user = {
                mobile: currentUserMobile,
                name: '', melli: '', email: '', address: '', post: '',
                date: new Date().toLocaleDateString('fa-IR'),
                wallet: 0, points: 0, cart: []
            };
            users.push(user);
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
            userIndex = users.length - 1;
        }

        document.getElementById('side-name').innerText = user.name ? user.name : "کاربر مهمان";
        document.getElementById('side-mobile').innerText = user.mobile;
        
        const fields = ['name', 'melli', 'email', 'address', 'post', 'date', 'mobile', 'wallet', 'points'];
        fields.forEach(f => {
            const displayEl = document.getElementById('v-' + f);
            const inputEl = document.getElementById('i-' + f);
            const val = user[f] !== undefined ? user[f] : (f === 'wallet' || f === 'points' ? '0' : '');
            
            if (displayEl) displayEl.innerText = val;
            if (inputEl) inputEl.value = val;
        });

        window.currentUserIndex = userIndex;
        renderFavs();
        renderOrders();
    }

    function showSection(sectionId, element) {
        const cards = document.querySelectorAll('.main-content > .card');
        cards.forEach(card => card.classList.add('hidden'));

        const targetCard = document.getElementById('sec-' + sectionId);
        if (targetCard) {
            targetCard.classList.remove('hidden');
        } else {
            console.error("بخش مورد نظر یافت نشد:", sectionId);
            return;
        }

        const menuItems = document.querySelectorAll('.menu-item');
        menuItems.forEach(item => item.classList.remove('active'));
        if (element) element.classList.add('active');

        if (sectionId === 'orders') {
            const orderTabs = document.querySelectorAll('.order-tab-btn');
            orderTabs.forEach(btn => btn.classList.remove('active'));
            if(orderTabs[0]) orderTabs[0].classList.add('active');
            renderOrders('current');
        }
    }

    function toggleEdit(status) {
        document.querySelectorAll('#sec-personal span').forEach(s => s.style.display = status ? 'none' : 'block');
        document.querySelectorAll('#sec-personal input').forEach(i => i.style.display = status ? 'block' : 'none');
        document.getElementById('edit-btn').style.display = status ? 'none' : 'inline-flex';
        document.getElementById('save-btn').style.display = status ? 'inline-flex' : 'none';
    }

    function saveUserData() {
        const index = window.currentUserIndex;
        if (index === undefined || index === -1) {
            alert("خطا: امکان ذخیره وجود ندارد.");
            return;
        }

        const users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];
        users[index].name = document.getElementById('i-name').value;
        users[index].melli = document.getElementById('i-melli').value;
        users[index].email = document.getElementById('i-email').value;
        users[index].address = document.getElementById('i-address').value;
        users[index].post = document.getElementById('i-post').value;

        localStorage.setItem(USERS_KEY, JSON.stringify(users));
        alert("اطلاعات با موفقیت ذخیره شد ✅");
        toggleEdit(false);
        document.getElementById('side-name').innerText = users[index].name || "کاربر مهمان";
    }

    // تابع جدید رندر علاقه‌مندی‌ها با استایل مدرن
    function renderFavs() {
        const wishlistIds = JSON.parse(localStorage.getItem(WISHLIST_KEY)) || [];
        const products = JSON.parse(localStorage.getItem(PRODUCTS_KEY)) || [];
        const listDiv = document.getElementById('favs-list');
        const favProducts = products.filter(p => wishlistIds.includes(p.id));
        
        if (favProducts.length === 0) {
            listDiv.innerHTML = '<div style="text-align:center; padding:40px; color:#aaa; grid-column: 1/-1;">لیست شما خالی است.</div>';
            return;
        }

        listDiv.innerHTML = favProducts.map(p => {
            const finalPrice = p.price - (p.price * (p.discount || 0) / 100);
            const oldPrice = p.price.toLocaleString();
            const priceDisplay = p.discount > 0 ? `<span class="old-price">${oldPrice}</span>` : '';

            return `
                <div class="wishlist-card">
                    <div class="wishlist-img-wrapper">
                        <img src="${p.image}" alt="${p.name}">
                        <div class="wishlist-actions-overlay">
                            <button class="action-btn-small btn-add-cart-mini" title="افزودن به سبد">
                                <i class="fas fa-shopping-cart"></i>
                            </button>
                            <button class="action-btn-small btn-remove-mini" onclick="removeFromFav(${p.id})" title="حذف">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="wishlist-info">
                        <div class="wishlist-title">${p.name}</div>
                        <div class="wishlist-price-row">
                            ${priceDisplay}
                            <div class="final-price">${finalPrice.toLocaleString()} <small>تومان</small></div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function removeFromFav(id) {
        if(!confirm("حذف شود؟")) return;
        let currentWishlist = JSON.parse(localStorage.getItem(WISHLIST_KEY)) || [];
        currentWishlist = currentWishlist.filter(pid => pid != id);
        localStorage.setItem(WISHLIST_KEY, JSON.stringify(currentWishlist));
        renderFavs();
    }

    function filterOrders(type) {
        document.querySelectorAll('.order-tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        renderOrders(type);
    }

    function renderOrders(filterType = 'current') {
        const orders = JSON.parse(localStorage.getItem(ORDERS_KEY)) || [];
        const currentUserMobile = localStorage.getItem(CURRENT_USER_KEY);
        let myOrders = orders.filter(o => o.userId === currentUserMobile);

        if (filterType === 'current') {
            myOrders = myOrders.filter(o => o.status !== 'delivered');
        } else {
            myOrders = myOrders.filter(o => o.status === 'delivered');
        }

        const listDiv = document.getElementById('orders-list');

        if (myOrders.length === 0) {
            listDiv.innerHTML = `<div style="text-align:center; padding:40px; color:#aaa;">${filterType === 'current' ? 'سفارش جاری ندارید.' : 'سفارش تحویل داده شده‌ای ندارید.'}</div>`;
            return;
        }

        listDiv.innerHTML = ''; // Clear previous content
        
        myOrders.reverse().forEach(order => {
            const dateObj = new Date(order.createdAt);
            const datePersian = dateObj.toLocaleDateString('fa-IR');
            const timePersian = dateObj.toLocaleTimeString('fa-IR');
            
            const steps = ['تامین کالا', 'پردازش انبار', 'ارسال', 'تحویل'];
            let currentStepIndex = 0;

            // تعیین مرحله فعلی بر اساس وضعیت
            if (order.status === 'paid') currentStepIndex = 0;
            else if (order.status === 'processing') currentStepIndex = 1;
            else if (order.status === 'shipped') currentStepIndex = 2;
            else if (order.status === 'delivered') currentStepIndex = 3;

            // آرایه برای نگهداری کلاس‌های CSS هر دایره
            let statusClass = []; 
            // آرایه برای نگهداری آیکون‌ها (تیک یا خالی)
            let checkIcon = [];
            // آرایه برای نگهداری وضعیت خطوط (پر شده یا نه)
            let lineClass = [];

            for (let i = 0; i < 4; i++) {
                // منطق دایره‌ها
                if (i <= currentStepIndex) {
                    // مراحل قبل + مرحله جاری: سبز با تیک (تکمیل شده)
                    statusClass.push('completed');
                    checkIcon.push('<i class="fas fa-check"></i>');
                } else {
                    // مراحل بعدی: خاکستری و خالی
                    statusClass.push('inactive');
                    checkIcon.push('');
                }

                // منطق خطوط بین دایره‌ها
                if (i < currentStepIndex) {
                    // خط بین دو مرحله کامل شده: کاملاً سبز
                    lineClass.push('filled final-filled');
                } else if (i === currentStepIndex) {
                    // خط بعد از مرحله جاری: ۱۰ درصد پر می‌شود
                    lineClass.push('filled filling-' + (i + 1)); 
                } else {
                    // خطوط آینده خاکستری هستند
                    lineClass.push('');
                }
            }
            
            // اگر وضعیت تحویل داده شده است، تمام خطوط باید ۱۰۰٪ پر باشند
            if (order.status === 'delivered') {
                lineClass = ['filled final-filled', 'filled final-filled', 'filled final-filled'];
            }

            // تولید HTML برای محصولات داخل سفارش
            let itemsGridHtml = '';
            if(order.items && Array.isArray(order.items)) {
                itemsGridHtml = order.items.map(item => {
                    const allProducts = JSON.parse(localStorage.getItem(PRODUCTS_KEY)) || [];
                    const productData = allProducts.find(p => p.id == item.id);
                    const imgUrl = productData ? productData.image : 'https://via.placeholder.com/80';
                    
                    return `
                        <div style="text-align:center;">
                            <img src="${imgUrl}" class="order-item-img" alt="${item.name}" style="width: 50px; height: 50px;">
                            <div class="item-name">${item.name}</div>
                            <div style="font-size:10px; color:#888;">x${item.qty}</div>
                        </div>
                    `;
                }).join('');
            }

            let cancelBtnHtml = '';
            if (filterType === 'current' && currentStepIndex < 2) {
                cancelBtnHtml = `<button class="btn-cancel-order" onclick="cancelOrder(${order.id})"><i class="fas fa-times"></i> لغو سفارش</button>`;
            }

            // ساختار نهایی کارت سفارش
            listDiv.innerHTML += `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <span class="order-id">#${order.id}</span>
                            <span class="order-date" style="margin-right:10px;">${datePersian} - ${timePersian}</span>
                        </div>
                        <div style="text-align:left;">
                            <div style="font-size:12px; color:#888;"> تلفن تماس:</div>
                            <div style="font-weight:bold; font-size:14px;">${order.userId}</div>
                        </div>
                    </div>
                    
                    <!-- شروع نوار وضعیت جدید -->
                    <div class="order-progress-wrapper">
                        <div class="steps-container">
                            
                            <!-- دایره ۱: تامین کالا (سمت راست) -->
                            <div class="step-circle-box ${statusClass[0]}">
                                <div class="circle-icon">${checkIcon[0]}</div>
                                <div class="step-label">تامین کالا</div>
                            </div>

                            <!-- لاین ۱ -->
                            <div class="track-line ${lineClass[0]}"></div>

                            <!-- دایره ۲: پردازش انبار -->
                            <div class="step-circle-box ${statusClass[1]}">
                                <div class="circle-icon">${checkIcon[1]}</div>
                                <div class="step-label">پردازش انبار</div>
                            </div>

                            <!-- لاین ۲ -->
                            <div class="track-line ${lineClass[1]}"></div>

                            <!-- دایره ۳: ارسال -->
                            <div class="step-circle-box ${statusClass[2]}">
                                <div class="circle-icon">${checkIcon[2]}</div>
                                <div class="step-label">ارسال</div>
                            </div>

                            <!-- لاین ۳ -->
                            <div class="track-line ${lineClass[2]}"></div>

                            <!-- دایره ۴: تحویل (سمت چپ) -->
                            <div class="step-circle-box ${statusClass[3]}">
                                <div class="circle-icon">${checkIcon[3]}</div>
                                <div class="step-label">تحویل</div>
                            </div>

                        </div>
                    </div>
                    <!-- پایان نوار وضعیت -->

                    <div style="margin-top:15px; font-size:12px; color:#666; display:flex; align-items:center; gap:5px;">
                        <i class="fas fa-map-marker-alt" style="color:var(--primary)"></i> ${order.address}
                    </div>

                    <div class="order-items-grid">
                        ${itemsGridHtml}
                    </div>

                    <div class="order-footer">
                        <div style="font-size:12px; color:#888;">جمع کل سفارش</div>
                        <div class="total-price">${order.totalAmount.toLocaleString()} <small>تومان</small></div>
                    </div>
                    <div style="margin-top:15px; text-align:left;">
                        ${cancelBtnHtml}
                    </div>
                </div>
            `;
        });
    }

    function cancelOrder(orderId) {
        if(!confirm("آیا از لغو این سفارش اطمینان دارید؟ این عمل غیرقابل بازگشت است.")) return;

        let orders = JSON.parse(localStorage.getItem(ORDERS_KEY)) || [];
        orders = orders.filter(o => o.id !== orderId);
        localStorage.setItem(ORDERS_KEY, JSON.stringify(orders));
        
        showToast("سفارش با موفقیت لغو شد.", "success");
        renderOrders('current');
    }

    function logout() {
        localStorage.removeItem(CURRENT_USER_KEY);
        window.location.href = 'DigiKala.html';
    }

    function showToast(msg, type) {
        alert(msg);
    }
</script>
</body>
</html>
